// Cascade-update all references to a serial number across the database.
// Used when a user renames a machine's serial number to keep linked
// reports/jobs/parts/POs/checklists in sync.
function cascadeSerialChange(oldSerial,newSerial){
  if(!oldSerial||!newSerial||oldSerial===newSerial)return;
  DB.reports.forEach(r=>{
    if(r.serial===oldSerial)r.serial=newSerial;
    if(Array.isArray(r.machines)){r.machines.forEach(mm=>{if(mm.serial===oldSerial)mm.serial=newSerial;});}
    if(Array.isArray(r.checklists)){r.checklists.forEach(cl=>{if(cl.serial===oldSerial)cl.serial=newSerial;});}
    if(r.checklist&&r.checklist.serial===oldSerial)r.checklist.serial=newSerial;
  });
  DB.jobs.forEach(j=>{if(j.machine===oldSerial)j.machine=newSerial;});
  (DB.parts||[]).forEach(p=>{if(p.serial===oldSerial)p.serial=newSerial;});
  (DB.pos||[]).forEach(p=>{if(p.serial===oldSerial)p.serial=newSerial;});
}

function saveMachine(){
  const origSerial=document.getElementById('eMSerial')?.value||'';
  const catSel=document.getElementById('mCat').value;
  const catCustom=document.getElementById('mCatCustom')?.value.trim()||'';
  const category=(catSel==='__other__'&&catCustom)?catCustom:(catSel||'');
  const d={
    serial:document.getElementById('mSr').value.trim(),
    model:document.getElementById('mMd').value.trim(),
    customer:document.getElementById('mCu').value,
    location:document.getElementById('mLo').value.trim(),
    installDate:document.getElementById('mDt').value,
    warranty:document.getElementById('mWr').value.trim(),
    purchaseRental:document.getElementById('mPR').value,
    serviceContract:document.getElementById('mSC').value.trim(),
    maintFrequency:document.getElementById('mMF').value.trim(),
    category:category
  };
  if(!d.serial){toast('Serial number required.','error');return;}
  if(!d.model){toast('Model required.','error');return;}
  
  if(!Array.isArray(DB.machines))DB.machines=[];
  
  if(origSerial){
    // Editing existing
    const i=DB.machines.findIndex(m=>m.serial===origSerial);
    if(i>=0){
      // If serial changed, check duplicate + cascade ALL references
      if(origSerial!==d.serial){
        if(DB.machines.find(m=>m.serial===d.serial)){toast('That serial already exists on another machine.','error');return;}
        cascadeSerialChange(origSerial,d.serial);
      }
      // If customer changed, update the link to all linked reports too
      const oldCust=DB.machines[i].customer;
      if(oldCust!==d.customer){
        DB.reports.forEach(r=>{if(r.serial===d.serial&&r.customer===oldCust)r.customer=d.customer;});
        DB.jobs.forEach(j=>{if(j.machine===d.serial&&j.customer===oldCust)j.customer=d.customer;});
      }
      DB.machines[i]={...DB.machines[i],...d};
    }else{
      d.id=DB.nM++;DB.machines.push(d);
    }
  }else{
    // Check duplicate serial
    if(DB.machines.find(m=>m.serial===d.serial)){toast('Serial already exists.','error');return;}
    d.id=DB.nM++;DB.machines.push(d);
  }
  saveDB();closeModal();renderMachines();
  // Also refresh customers page so machine counts stay accurate
  if(document.getElementById('customersContent'))renderCusts();
  toast('Machine saved.','success');
}

function delMachine(serial){
  const rptCount=DB.reports.filter(r=>r.serial===serial).length;
  if(!confirm(`Delete machine "${serial}"?${rptCount?'\n\n⚠ '+rptCount+' report(s) reference this machine. Reports will be kept for records.':''}`))return;
  DB.machines=(DB.machines||[]).filter(m=>m.serial!==serial);
  if(!Array.isArray(DB.deletedMachines))DB.deletedMachines=[];
  if(!DB.deletedMachines.includes(serial))DB.deletedMachines.push(serial);
  saveDB();renderMachines();renderDash();
  // Also refresh customers page so machine counts stay accurate
  if(document.getElementById('customersContent'))renderCusts();
  toast('Machine deleted.','info');
}

function delCust(nameOrEl){
  const name=typeof nameOrEl==='string'?nameOrEl:nameOrEl;
  if(!name)return;
  const machCount=(DB.machines||[]).filter(m=>m.customer===name).length;
  const rptCount=DB.reports.filter(r=>r.customer===name).length;
  
  let msg=`Delete customer "${name}"?`;
  if(machCount)msg+=`\n\n⚠ ${machCount} machine(s) linked.`;
  if(rptCount)msg+=`\n⚠ ${rptCount} report(s) reference this customer.`;
  if(machCount||rptCount)msg+=`\n\nThe customer and all linked machines will be removed. Reports will be kept for records.`;
  
  if(!confirm(msg))return;
  
  // Remove from DB.custs
  DB.custs=DB.custs.filter(c=>c.name!==name);
  
  // Remove linked machines
  if(DB.machines)DB.machines=DB.machines.filter(m=>m.customer!==name);
  
  // Add to blocklist so getAllCusts doesn't recreate from reports
  if(!Array.isArray(DB.deletedCusts))DB.deletedCusts=[];
  if(!DB.deletedCusts.includes(name))DB.deletedCusts.push(name);
  
  saveDB();renderCusts();renderDash();
  toast(`"${name}" deleted${machCount?' + '+machCount+' machine(s)':''}.`,'info');
}

function viewCustMachines(custName){
  const ms=(DB.machines||[]).filter(m=>m.customer===custName);
  const rptMs=DB.reports.filter(r=>r.customer===custName&&r.serial).reduce((acc,r)=>{if(!acc.find(x=>x.serial===r.serial))acc.push({serial:r.serial,model:r.model});return acc;},[]);
  // Merge
  const allSerials=new Set();
  const combined=[];
  ms.forEach(m=>{allSerials.add(m.serial);combined.push({...m,_source:'registry'});});
  rptMs.forEach(m=>{if(!allSerials.has(m.serial)){combined.push({...m,customer:custName,location:'',installDate:'',warranty:'',purchaseRental:'',serviceContract:'',_source:'report'});}});

  const html=combined.length?combined.map(m=>{
    const serialDisp=m.serial?E(m.serial):'<em style="color:var(--er);font-weight:normal">⚠ (no serial — orphan record)</em>';
    const escSerial=E(m.serial||'').replace(/'/g,"\\'");
    const isOrphan=!m.serial||!m.serial.trim();
    return `<div style="padding:12px 0;border-bottom:1px solid var(--bdr)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap"><strong style="word-break:break-word">${serialDisp}</strong>
      <div style="display:flex;gap:6px;flex-shrink:0">
        ${m._source==='report'?`<span class="bd bd-wn" title="Only seen in reports — not in registry">📋 Report-only</span>`:''}
        ${canEdit()&&!isOrphan?`<button class="btn btn-sm btn-s" onclick="closeModal();editMachine('${escSerial}')">Edit</button>`:''}
        ${canDelete()?`<button class="btn btn-sm btn-d" onclick="delMachineFromCust('${escSerial}','${E(custName).replace(/'/g,"\\'")}','${m._source}')">${isOrphan?'🗑 Remove Orphan':'Delete'}</button>`:''}
      </div></div>
      <div style="font-size:var(--fs-sm);color:var(--t2);margin-top:4px">${E(m.model||'(no model)')} ${m.location?'• '+E(m.location):''} ${m.installDate?'• Installed '+E(m.installDate):''}</div>
    </div>`;
  }).join(''):'<p style="color:var(--t3)">No machines linked to this customer.</p>';

  openModal(`Machines — ${custName}`,html+`<div style="margin-top:16px"><button class="btn btn-p btn-sm" onclick="closeModal();openMachineModal({customer:'${E(custName)}'})">+ Add Machine</button></div>`,`<button class="btn btn-s" onclick="closeModal()">Close</button>`);
}

// Delete a machine record from the Customer Machines modal.
// Handles both registry records (DB.machines) and report-only orphans (empty/missing serial).
function delMachineFromCust(serial,custName,source){
  const isOrphan=!serial||!serial.trim();
  if(isOrphan){
    if(!confirm(`Remove this orphan machine record for "${custName}"?\n\nThis will clear empty model/serial fields from any reports of this customer that have no serial. The reports themselves are NOT deleted.`))return;
    // Clean up — for any DB.machines entry with empty serial AND this customer, remove
    const before=(DB.machines||[]).length;
    DB.machines=(DB.machines||[]).filter(m=>!(m.customer===custName&&(!m.serial||!m.serial.trim())));
    const removed=before-DB.machines.length;
    saveDB();closeModal();renderCusts();
    if(document.getElementById('machinesContent'))renderMachines();
    toast(`Removed ${removed} orphan record${removed!==1?'s':''}.`,'success');
    return;
  }
  if(source==='report'){
    if(!confirm(`This serial "${serial}" is not in the Machine Registry — it only appears inside reports. Reports won't be deleted.\n\nNothing to remove from the Machine Registry. Edit the reports directly if you want to change their machine info.`)){return;}
    toast('No registry record to delete.','info');return;
  }
  // Standard registry delete with linked records info
  const linkedReports=DB.reports.filter(r=>r.serial===serial).length;
  const linkedJobs=DB.jobs.filter(j=>j.machine===serial).length;
  const linkedParts=(DB.parts||[]).filter(p=>p.serial===serial).length;
  let msg=`Delete machine "${serial}" from the registry?`;
  if(linkedReports||linkedJobs||linkedParts){
    msg+=`\n\n⚠ This serial is referenced by:\n`;
    if(linkedReports)msg+=`  • ${linkedReports} service report${linkedReports>1?'s':''}\n`;
    if(linkedJobs)msg+=`  • ${linkedJobs} job${linkedJobs>1?'s':''}\n`;
    if(linkedParts)msg+=`  • ${linkedParts} parts record${linkedParts>1?'s':''}\n`;
    msg+=`\nLinked records are NOT deleted, but they'll lose their machine reference. Proceed?`;
  }
  if(!confirm(msg))return;
  DB.machines=(DB.machines||[]).filter(m=>m.serial!==serial);
  saveDB();closeModal();renderCusts();
  if(document.getElementById('machinesContent'))renderMachines();
  toast(`Machine "${serial}" deleted.`,'success');
}

function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function calToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();}
function calSetView(v){calView=v;renderCal();}

function _collectCalEvents(){
  const ev={};
  function ae(dt,d){if(!dt)return;if(!ev[dt])ev[dt]=[];ev[dt].push(d);}
  DB.reports.forEach(r=>{
    ae(r.date,{type:'report',id:r.id,l:(r.customer||'').substring(0,20),full:r.customer||'',sub:'📋 '+(r.jobNo||'')+' · '+(r.type||''),bg:'var(--oks)',c:'var(--ok)',dot:'var(--ok)'});
    ae(r.nextVisit,{type:'followup',id:r.id,l:'🔔 '+(r.customer||'').substring(0,16),full:'Follow-up: '+(r.customer||''),sub:'Next visit · '+(r.jobNo||''),bg:'var(--wns)',c:'var(--wn)',dot:'var(--wn)'});
  });
  DB.jobs.forEach(j=>{
    if(j.status!=='Completed')ae(j.date,{type:'job',id:j.id,l:'🔧 '+(j.title||'').substring(0,18),full:j.title||'',sub:(j.customer||'')+' · '+(j.type||'')+(j.time?' @ '+j.time:''),bg:'var(--acs)',c:'var(--ac)',dot:'var(--ac)'});
  });
  Object.keys(SG_HOLIDAYS).forEach(dt=>{
    ae(dt,{type:'holiday',id:0,l:'🎉 '+SG_HOLIDAYS[dt],full:SG_HOLIDAYS[dt],sub:'🇸🇬 Singapore Public Holiday',bg:'var(--pus)',c:'var(--pu)',dot:'var(--pu)'});
  });
  return ev;
}

function showDayEvents(ds){
  const ev=_collectCalEvents();
  const de=ev[ds]||[];
  const d=new Date(ds+'T00:00:00');
  const wk=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const ttl=`${wk}, ${d.getDate()} ${mo} ${d.getFullYear()}`;
  if(!de.length){openModal(ttl,'<p style="color:var(--t3);padding:20px;text-align:center">No events on this day.</p>',`<button class="btn btn-s" onclick="closeModal()">Close</button>`);return;}
  const body=de.map(e=>{
    const action=e.type==='holiday'?'':e.type==='job'?`onclick="closeModal();showPage('jobs');setTimeout(()=>{if(typeof showJobById==='function')showJobById(${e.id});},150)"`:`onclick="closeModal();showPage('reports');setTimeout(()=>{const r=DB.reports.find(x=>x.id===${e.id});if(r&&typeof viewRptPreview==='function')viewRptPreview(${e.id});},150)"`;
    return `<div class="cal-agenda-ev" style="background:${e.bg};cursor:${e.type==='holiday'?'default':'pointer'}" ${action}>
      <div class="ae-dot" style="background:${e.dot}"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;color:${e.c};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(e.full)}</div>
        <div style="font-size:10px;color:var(--t2);margin-top:2px">${E(e.sub)}</div>
      </div>
    </div>`;
  }).join('');
  openModal(`${ttl} — ${de.length} event${de.length>1?'s':''}`,body,`<button class="btn btn-s" onclick="closeModal()">Close</button>`);
}

function renderCal(){
  if(calY===undefined){const n=new Date();calY=n.getFullYear();calM=n.getMonth();}
  const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const td=new Date();
  const ev=_collectCalEvents();
  let h=`<div class="cal-view-tabs">
    <button class="cal-view-tab${calView==='month'?' active':''}" onclick="calSetView('month')">📅 Month</button>
    <button class="cal-view-tab${calView==='agenda'?' active':''}" onclick="calSetView('agenda')">📋 Agenda</button>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-s btn-sm" onclick="calPrev()" style="min-width:64px">← Prev</button>
    <div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0">
      <h3 style="font-size:var(--fs-lg);font-weight:700;text-align:center;margin:0">${mo[calM]} ${calY}</h3>
      <button class="btn btn-s" style="font-size:var(--fs-xs);padding:3px 10px;min-height:24px;margin-top:4px" onclick="calToday()">Today</button>
    </div>
    <button class="btn btn-s btn-sm" onclick="calNext()" style="min-width:64px">Next →</button>
  </div>`;

  if(calView==='agenda'){
    // Agenda view — list ALL dated events in current month grouped by day
    const monthEvs={};
    Object.keys(ev).forEach(ds=>{const d=new Date(ds+'T00:00:00');if(d.getFullYear()===calY&&d.getMonth()===calM)monthEvs[ds]=ev[ds];});
    const sortedDays=Object.keys(monthEvs).sort();
    if(!sortedDays.length){h+='<div class="es" style="padding:32px"><p>No events this month.</p></div>';}
    else{
      const wkS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      sortedDays.forEach(ds=>{
        const d=new Date(ds+'T00:00:00');
        const isT=td.getFullYear()===d.getFullYear()&&td.getMonth()===d.getMonth()&&td.getDate()===d.getDate();
        const evs=monthEvs[ds];
        h+=`<div class="cal-agenda-day${isT?' today':''}">
          <div class="cal-agenda-head">
            <span class="ad-date">${d.getDate()} ${mo[d.getMonth()].substring(0,3)}${isT?' · TODAY':''}</span>
            <span class="ad-day">${wkS[d.getDay()]} · ${evs.length} event${evs.length>1?'s':''}</span>
          </div>`;
        evs.forEach(e=>{
          const action=e.type==='holiday'?'':e.type==='job'?`onclick="showPage('jobs');setTimeout(()=>{if(typeof showJobById==='function')showJobById(${e.id});},150)"`:`onclick="showPage('reports');setTimeout(()=>{if(typeof viewRptPreview==='function')viewRptPreview(${e.id});},150)"`;
          h+=`<div class="cal-agenda-ev" style="background:${e.bg};cursor:${e.type==='holiday'?'default':'pointer'}" ${action}>
            <div class="ae-dot" style="background:${e.dot}"></div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;color:${e.c};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(e.full)}</div>
              <div style="font-size:10px;color:var(--t2);margin-top:2px">${E(e.sub)}</div>
            </div>
          </div>`;
        });
        h+='</div>';
      });
    }
    document.getElementById('calendarContent').innerHTML=h;
    return;
  }

  // Month grid view
  const fd=new Date(calY,calM,1).getDay();
  const dm=new Date(calY,calM+1,0).getDate();
  h+='<div class="cg">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{h+=`<div class="ch-h">${d}</div>`;});
  const pd=new Date(calY,calM,0).getDate();
  for(let i=fd-1;i>=0;i--)h+=`<div class="cd om"><div class="dn">${pd-i}</div></div>`;
  for(let d=1;d<=dm;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const it=td.getFullYear()===calY&&td.getMonth()===calM&&td.getDate()===d;
    const de=ev[ds]||[];
    const hasEv=de.length>0;
    h+=`<div class="cd ${it?'today':''} ${hasEv?'has-ev':''}" onclick="showDayEvents('${ds}')">
      <div class="dn"><span>${d}</span>${hasEv?`<span class="ev-count">${de.length}</span>`:''}</div>
      ${de.slice(0,3).map(e=>`<div class="ce" style="background:${e.bg};color:${e.c}" title="${E(e.full)}">${E(e.l)}</div>`).join('')}
      ${de.length>3?`<div style="font-size:9px;color:var(--ac);font-weight:700;text-align:center;margin-top:auto">+${de.length-3} more</div>`:''}
    </div>`;
  }
  const tt=fd+dm;
  for(let i=1;i<=(7-(tt%7))%7;i++)h+=`<div class="cd om"><div class="dn">${i}</div></div>`;
  h+='</div>';
  // Legend
  h+=`<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;padding:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);font-size:var(--fs-xs)">
    <div style="display:flex;align-items:center;gap:6px"><div class="ae-dot" style="width:10px;height:10px;border-radius:50%;background:var(--ac)"></div>🔧 Jobs</div>
    <div style="display:flex;align-items:center;gap:6px"><div class="ae-dot" style="width:10px;height:10px;border-radius:50%;background:var(--ok)"></div>📋 Reports</div>
    <div style="display:flex;align-items:center;gap:6px"><div class="ae-dot" style="width:10px;height:10px;border-radius:50%;background:var(--wn)"></div>🔔 Follow-ups</div>
    <div style="display:flex;align-items:center;gap:6px"><div class="ae-dot" style="width:10px;height:10px;border-radius:50%;background:var(--pu)"></div>🎉 SG Holidays</div>
    <div style="color:var(--t3);margin-left:auto">Tap any day to see all events</div>
  </div>`;
  document.getElementById('calendarContent').innerHTML=h;
}

let scanBase64=null,scanCanvas=null,scanOrigData=null,scanIsPDF=false,scanMediaType='image/jpeg';

function procScan(f){
  if(!f)return;
  scanIsPDF=f.type==='application/pdf';
  
  const reader=new FileReader();
  reader.onload=function(e){
    scanBase64=e.target.result;
    
    if(scanIsPDF){
      // Show PDF info (can't preview PDF on canvas)
      scanMediaType='application/pdf';
      document.getElementById('scPreviewImg').src='';
      document.getElementById('scPreviewImg').alt='PDF uploaded: '+f.name;
      document.getElementById('scPreviewImg').style.display='none';
      document.getElementById('scPrev').style.display='block';
      document.getElementById('scPrev').querySelector('.scan-enhance').style.display='none';
      // Show a PDF indicator instead of image
      const prevDiv=document.getElementById('scPrev');
      prevDiv.insertAdjacentHTML('afterbegin',`<div id="pdfBanner" style="padding:24px;background:var(--ers);border-radius:var(--r);text-align:center;margin-bottom:12px"><div style="font-size:32px;margin-bottom:8px">📄</div><div style="font-size:var(--fs);font-weight:700">${E(f.name)}</div><div style="font-size:var(--fs-sm);color:var(--t2);margin-top:4px">${(f.size/1024).toFixed(0)} KB — PDF will be sent directly to AI</div></div>`);
      // Auto-send to AI for PDFs
      setTimeout(()=>sendToAI(),500);
    } else {
      // Image handling with enhancement
      scanMediaType=f.type.startsWith('image/png')?'image/png':'image/jpeg';
      document.getElementById('scPreviewImg').style.display='block';
      document.getElementById('scPreviewImg').src=scanBase64;
      document.getElementById('scPrev').style.display='block';
      document.getElementById('scPrev').querySelector('.scan-enhance').style.display='block';
      // Remove any PDF banner
      document.getElementById('pdfBanner')?.remove();
      
      const img=new Image();
      img.onload=function(){
        scanCanvas=document.createElement('canvas');
        let w=img.width,h=img.height;const maxW=1200;if(w>maxW){h=h*(maxW/w);w=maxW;}
        scanCanvas.width=w;scanCanvas.height=h;
        const ctx=scanCanvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        scanOrigData=ctx.getImageData(0,0,w,h);
        autoEnhance();
      };
      img.src=scanBase64;
    }
  };
  reader.readAsDataURL(f);
}

function applyEnhancePreview(){
  if(!scanOrigData||!scanCanvas)return;
  const b=parseInt(document.getElementById('scBright').value);
  const c=parseInt(document.getElementById('scContrast').value);
  document.getElementById('scBrVal').textContent=b;
  document.getElementById('scCoVal').textContent=c;
  const ctx=scanCanvas.getContext('2d');
  const imgData=new ImageData(new Uint8ClampedArray(scanOrigData.data),scanOrigData.width,scanOrigData.height);
  const d=imgData.data;const cf=(259*(c+255))/(255*(259-c));
  for(let i=0;i<d.length;i+=4){
    for(let ch=0;ch<3;ch++){d[i+ch]=Math.min(255,Math.max(0,cf*(d[i+ch]+b-128)+128));}
  }
  ctx.putImageData(imgData,0,0);
  document.getElementById('scPreviewImg').src=scanCanvas.toDataURL('image/jpeg',0.9);
}

function autoEnhance(){document.getElementById('scBright').value=20;document.getElementById('scContrast').value=40;applyEnhancePreview();}
function resetEnhance(){document.getElementById('scBright').value=0;document.getElementById('scContrast').value=0;applyEnhancePreview();}

async function sendToAI(){
  const apiKey=localStorage.getItem('ocrm4_gemini_key');
  if(!apiKey){
    toast('Please enter your Google Gemini API key first.','error');
    document.getElementById('apiKeyInput')?.focus();
    return;
  }

  const procEl=document.getElementById('scProc');
  const resEl=document.getElementById('scRes');
  procEl.style.display='block';resEl.style.display='none';
  document.getElementById('scProcMsg').textContent='🤖 Gemini AI is reading your document...';

  // Get the image/PDF data
  let base64Data, mimeType;
  if(scanIsPDF){
    base64Data=scanBase64.split(',')[1];
    mimeType='application/pdf';
  } else {
    const imgSrc=scanCanvas?scanCanvas.toDataURL('image/jpeg',0.85):scanBase64;
    base64Data=imgSrc.split(',')[1];
    mimeType=imgSrc.startsWith('data:image/png')?'image/png':'image/jpeg';
  }

  const prompt=`You are reading a Field Service Report document. Read every handwritten and printed field carefully.

Extract ALL information and return ONLY a valid JSON object with these exact keys (use empty string "" if a field is not found or not readable):

{
  "company": "Determine from letterhead: use 'octopack' for Octopack SEA, 'jw' for JW Supplies & Works, 'redbox' for Redbox Global Solutions. If unknown use 'octopack'",
  "jobNo": "The SR- or job number",
  "date": "In YYYY-MM-DD format",
  "customer": "Customer name and address combined",
  "contact": "Contact person name",
  "contactNum": "Phone number if visible",
  "model": "Equipment make/model",
  "serial": "Serial number",
  "engineer": "Serviced by name",
  "type": "One of: Preventive Maintenance, Corrective Maintenance, Breakdown Call, Follow-Up Call, Installation, Inspection, Emergency",
  "timeStart": "In HH:MM 24hr format",
  "timeEnd": "In HH:MM 24hr format",
  "remarks": "All issues and remarks text, include all details",
  "recommendations": "All recommendations and follow up actions text"
}

CRITICAL: Return ONLY the raw JSON object. No markdown fences, no backticks, no explanation text before or after.`;

  try{
    const response=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{
          parts:[
            {inline_data:{mime_type:mimeType,data:base64Data}},
            {text:prompt}
          ]
        }],
        generationConfig:{
          temperature:0.1,
          maxOutputTokens:2000
        }
      })
    });

    if(!response.ok){
      const errData=await response.json().catch(()=>({}));
      const errMsg=errData.error?.message||`HTTP ${response.status}`;
      throw new Error(errMsg);
    }

    const data=await response.json();
    
    // Extract text from Gemini response
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!text){throw new Error('Empty response from Gemini');}
    
    // Parse JSON — clean up any markdown fences
    const clean=text.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    const parsed=JSON.parse(clean);
    
    document.getElementById('scProcMsg').textContent='✅ Gemini extraction complete!';
    setTimeout(()=>{procEl.style.display='none';resEl.style.display='block';showScanForm(parsed);},500);
    
  }catch(err){
    console.error('Gemini scan error:',err);
    const errMsg=err.message||'Unknown error';
    if(errMsg.includes('API_KEY_INVALID')||errMsg.includes('401')||errMsg.includes('403')){
      document.getElementById('scProcMsg').textContent='❌ Invalid API key. Get a free key at aistudio.google.com/apikey';
    }else if(errMsg.includes('429')||errMsg.includes('RATE_LIMIT')){
      document.getElementById('scProcMsg').textContent='⏳ Rate limited (15/min free tier). Wait a moment and retry.';
    }else if(errMsg.includes('JSON')){
      document.getElementById('scProcMsg').textContent='⚠️ AI could not parse the document clearly. Try a clearer photo.';
    }else{
      document.getElementById('scProcMsg').textContent='⚠️ '+errMsg;
    }
    setTimeout(()=>{procEl.style.display='none';resEl.style.display='block';showScanForm({});},2500);
  }
}

function renderCalPreview(){
  const today=new Date().toISOString().split('T')[0];
  const events=[];
  
  DB.jobs.forEach(j=>{
    if(!j.date)return;
    const techNames=getJobTechNames(j);
    events.push({date:j.date,time:j.time||'',title:j.title,type:'Job',status:j.status,detail:`${j.customer||''} | ${techNames}`,badge:'bd-ac'});
  });
  
  DB.reports.forEach(r=>{

}

function expICS(filter){
  const events=[];
  const now=new Date();
  const stamp=now.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  
  // Jobs
  if(filter==='all'||filter==='jobs'){
    DB.jobs.forEach(j=>{
      if(!j.date)return;
      const techNames=getJobTechNames(j);
      const cust=DB.custs.find(c=>c.name===j.customer);
      const d=j.date.replace(/-/g,'');
      const ev=['BEGIN:VEVENT',`UID:job-${j.id}@octocrm`,`DTSTAMP:${stamp}`];
      
      if(j.time){
        // Timed event
        const [hh,mm]=j.time.split(':');
        ev.push(`DTSTART:${d}T${hh}${mm}00`);
        ev.push(`DTEND:${d}T${String(parseInt(hh)+2).padStart(2,'0')}${mm}00`);
      }else{
        ev.push(`DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`);
      }
      
      ev.push(`SUMMARY:${icsEsc(j.title||'Job')}`);
      if(cust?.address)ev.push(`LOCATION:${icsEsc(cust.address)}`);
      
      let desc=`Type: ${j.type||''}\nCustomer: ${j.customer||''}\nTechnician(s): ${techNames}\nPriority: ${j.priority||''}\nStatus: ${j.status||''}`;
      if(j.machine)desc+=`\nMachine S/N: ${j.machine}`;
      if(cust?.phone)desc+=`\nContact: ${cust.contact||''} ${cust.phone}`;
      if(j.desc)desc+=`\n\nInstructions:\n${j.desc}`;
      ev.push(`DESCRIPTION:${icsEsc(desc)}`);
      
      // Color/category
      if(j.priority==='Urgent'||j.priority==='High')ev.push('PRIORITY:1');
      else if(j.priority==='Medium')ev.push('PRIORITY:5');
      else ev.push('PRIORITY:9');
      
      ev.push(`STATUS:${j.status==='Completed'?'COMPLETED':'CONFIRMED'}`);
      ev.push('END:VEVENT');
      events.push(ev.join('\r\n'));
    });
  }
  
  // Next visits from reports
  if(filter==='all'||filter==='visits'){
    DB.reports.forEach(r=>{
      if(!r.nextVisit)return;
      const d=r.nextVisit.replace(/-/g,'');
      const ev=['BEGIN:VEVENT',`UID:visit-${r.id}@octocrm`,`DTSTAMP:${stamp}`,
        `DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,
        `SUMMARY:${icsEsc('Follow-up: '+r.customer+' — '+r.model)}`,
        `DESCRIPTION:${icsEsc(`Follow-up visit for ${r.customer}\nMachine: ${r.model||''} (S/N: ${r.serial||''})\nPrevious job: ${r.jobNo||''} on ${r.date||''}\nEngineer: ${r.engineer||''}\nPrevious remarks: ${r.remarks||''}\nRecommendations: ${r.recommendations||''}`)}`,
        'PRIORITY:5','STATUS:NEEDS-ACTION','END:VEVENT'];
      events.push(ev.join('\r\n'));
    });
  }
  
  if(!events.length){toast('No events to export.','info');return;}
  
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//OctoCRM//Field Service v4//EN',
    'X-WR-CALNAME:OctoCRM — Technical Department','METHOD:PUBLISH','CALSCALE:GREGORIAN',
    ...events,'END:VCALENDAR'].join('\r\n');
  
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`OctoCRM_Calendar_${filter}_${new Date().toISOString().split('T')[0]}.ics`;
  a.click();URL.revokeObjectURL(a.href);
  toast(`Exported ${events.length} event(s).`,'success');
}

function icsEsc(s){
  if(!s)return'';
  return String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

function editAgent(id){const a=(DB.agents||[]).find(x=>x.id===id);if(a)openAgentModal(a);}

function saveAgent(){
  const eidEl=document.getElementById('eAId');const eid=eidEl?eidEl.value:'';
  const d={name:document.getElementById('aNm').value.trim(),type:document.getElementById('aTy').value,address:document.getElementById('aAd').value.trim(),contact:document.getElementById('aCo').value.trim(),phone:document.getElementById('aPh').value.trim(),email:document.getElementById('aEm').value.trim()};
  if(!d.name){toast('Name required.','error');return;}
  if(!Array.isArray(DB.agents))DB.agents=[];
  if(eid&&eid!==''){
    const i=DB.agents.findIndex(a=>a.id===parseInt(eid));
    if(i>=0){
      const oldName=DB.agents[i].name;
      DB.agents[i]={...DB.agents[i],...d};
      // Update customer references if name changed
      if(oldName!==d.name){DB.custs.forEach(c=>{if(c.agent===oldName)c.agent=d.name;});}
    }else{d.id=DB.nA++;DB.agents.push(d);}
  }else{d.id=DB.nA++;DB.agents.push(d);}
  saveDB();closeModal();renderAgents();toast('Saved.','success');
}

function delAgent(id,name){
  const custCount=DB.custs.filter(c=>c.agent===name).length;
  if(!confirm(`Delete agent "${name}"?${custCount?'\n\n⚠ '+custCount+' customer(s) are linked to this agent. They will be set to no agent.':''}`))return;
  DB.agents=(DB.agents||[]).filter(a=>a.id!==id);
  // Clear agent from linked customers
  DB.custs.forEach(c=>{if(c.agent===name)c.agent='';});
  saveDB();renderAgents();toast('Agent deleted.','info');
}

// Trends grouped by machine model & customer
function renderBreakdownTrends(){
  // Group reports by model
  const byModel={};
  DB.reports.forEach(r=>{
    if(!r.model)return;
    if(!byModel[r.model])byModel[r.model]={count:0,types:{},customers:new Set(),symptoms:[]};
    byModel[r.model].count++;
    byModel[r.model].types[r.type]=(byModel[r.model].types[r.type]||0)+1;
    if(r.customer)byModel[r.model].customers.add(r.customer);
    if(r.remarks)byModel[r.model].symptoms.push({date:r.date,customer:r.customer,serial:r.serial,text:r.remarks.substring(0,200),id:r.id});
  });
  const sorted=Object.entries(byModel).sort((a,b)=>b[1].count-a[1].count);
  if(!sorted.length)return'<div class="es"><p>No reports yet. Create reports to see trends.</p></div>';
  return`<div class="tw"><div class="th"><h3>By Machine Model</h3></div>
    ${sorted.map(([model,d])=>`<div class="rpt-card">
      <div class="rpt-card-top"><span style="font-weight:700">${E(model)}</span><span class="bd bd-ac">${d.count} job${d.count!==1?'s':''}</span></div>
      <div class="rpt-card-row"><span class="rc-label">Customers</span><span class="rc-val">${d.customers.size}</span></div>
      <div class="rpt-card-row"><span class="rc-label">Breakdown by type</span><span class="rc-val" style="max-width:65%">${Object.entries(d.types).map(([t,n])=>`${E(t)}: ${n}`).join(' • ')}</span></div>
      ${d.symptoms.length?`<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--ac);font-weight:600">▶ Recent symptoms &amp; fixes (${d.symptoms.length})</summary>
        <div style="margin-top:8px;padding:8px;background:var(--input);border-radius:var(--r);max-height:280px;overflow:auto">
          ${d.symptoms.slice(-10).reverse().map(s=>`<div style="padding:6px 0;border-bottom:1px dashed var(--bdr);font-size:var(--fs-sm)"><b>${E(s.date||'')}</b> — ${E(s.customer||'')} (S/N: ${E(s.serial||'')})<br><span style="color:var(--t2)">${E(s.text)}</span> <a href="#" onclick="event.preventDefault();viewRptPreview(${s.id})" style="color:var(--ac)">View →</a></div>`).join('')}
        </div></details>`:''}
    </div>`).join('')}</div>`;
}

function renderPartsLog(){
  const parts=[...DB.parts].sort((a,b)=>b.id-a.id);
  if(!parts.length)return'<div class="es"><p>No parts logged yet. Add parts when creating a service report.</p></div>';
  return`<div class="tw"><div class="th"><h3>Parts Used (${parts.length})</h3></div>
    ${parts.slice(0,200).map(p=>`<div class="rpt-card">
      <div class="rpt-card-top"><span style="font-weight:700">${E(p.name)}</span><span class="bd bd-ac">× ${p.qty}</span></div>

    </div>`).join('')}</div>`;
}

function renderCommonParts(){
  const tally={};
  DB.parts.forEach(p=>{
    const key=p.name.toLowerCase().trim();
    if(!tally[key])tally[key]={name:p.name,total:0,models:new Set(),lastUsed:p.date};
    tally[key].total+=p.qty;
    if(p.model)tally[key].models.add(p.model);
    if(p.date>tally[key].lastUsed)tally[key].lastUsed=p.date;
  });
  const sorted=Object.values(tally).sort((a,b)=>b.total-a.total);
  if(!sorted.length)return'<div class="es"><p>No parts data yet.</p></div>';
  return`<div class="tw"><div class="th"><h3>Most Replaced Parts (Top ${Math.min(sorted.length,30)})</h3><button class="btn btn-sm btn-p" onclick="addCommonToStock()">+ Add All to Stock</button></div>
    ${sorted.slice(0,30).map(p=>`<div class="rpt-card">
      <div class="rpt-card-top"><span style="font-weight:700">${E(p.name)}</span><span class="bd bd-er">${p.total} replaced</span></div>
      <div class="rpt-card-row"><span class="rc-label">Used on models</span><span class="rc-val" style="max-width:65%">${[...p.models].map(E).join(', ')||'—'}</span></div>
      <div class="rpt-card-row"><span class="rc-label">Last used</span><span class="rc-val">${E(p.lastUsed)}</span></div>
      <div class="rpt-card-actions"><button class="btn btn-sm btn-s" onclick="quickAddStock('${E(p.name).replace(/'/g,'\\\'')}')">+ Add to stock</button></div>
    </div>`).join('')}</div>`;
}

function quickAddStock(name){
  const existing=DB.partsStock.find(s=>s.name.toLowerCase()===name.toLowerCase());
  if(existing){toast('Already in stock list.','info');return;}
  DB.partsStock.push({id:DB.nPS++,name:name,qty:0,reorderAt:1,notes:''});
  saveDB();curPartsTab='stock';renderParts();toast('Added to stock.','success');
}

function addCommonToStock(){
  const tally={};
  DB.parts.forEach(p=>{const k=p.name.toLowerCase().trim();if(!tally[k])tally[k]=p.name;});
  let added=0;
  Object.values(tally).forEach(name=>{
    if(!DB.partsStock.find(s=>s.name.toLowerCase()===name.toLowerCase())){
      DB.partsStock.push({id:DB.nPS++,name:name,qty:0,reorderAt:1,notes:''});
      added++;
    }
  });
  saveDB();curPartsTab='stock';renderParts();toast(`Added ${added} parts to stock.`,'success');
}

function renderPartsStock(){
  const stock=[...DB.partsStock].sort((a,b)=>a.name.localeCompare(b.name));
  return`<div class="tw"><div class="th"><h3>Stock Inventory (${stock.length})</h3><div style="display:flex;gap:8px;flex-wrap:wrap">${canEdit()?'<button class="btn btn-sm btn-s" onclick="openManualMerge(\'inventory\')">⇄ Merge</button><button class="btn btn-p btn-sm" onclick="openStockModal()">+ Add Part</button>':''}</div></div>
    ${stock.length?stock.map(s=>{
      const low=s.qty<=s.reorderAt;
      return`<div class="rpt-card">
        <div class="rpt-card-top"><span style="font-weight:700">${E(s.name)}</span><span class="bd ${low?'bd-er':'bd-ok'}">${low?'⚠ LOW':'OK'} — ${s.qty} in stock</span></div>
        <div class="rpt-card-row"><span class="rc-label">Reorder at</span><span class="rc-val">${s.reorderAt}</span></div>
        ${s.notes?`<div class="rpt-card-row"><span class="rc-label">Notes</span><span class="rc-val" style="max-width:65%">${E(s.notes)}</span></div>`:''}
        <div class="rpt-card-actions">
          ${canEdit()?`<button class="btn btn-sm btn-s" onclick="adjustStock(${s.id},1)">+1</button>`:''}
          ${canEdit()?`<button class="btn btn-sm btn-s" onclick="adjustStock(${s.id},-1)">-1</button>`:''}
          ${canEdit()?`<button class="btn btn-sm btn-s" onclick="openStockModal(${s.id})">Edit</button>`:''}
          ${canDelete()?`<button class="btn btn-sm btn-d" onclick="delStock(${s.id})">Delete</button>`:''}
        </div>
      </div>`;
    }).join(''):'<div class="es"><p>No stock parts yet. Add common parts from the Common Parts tab.</p></div>'}</div>`;
}

function openStockModal(id){
  const s=id?DB.partsStock.find(x=>x.id===id):{};const d=s||{};
  openModal(d.name?'Edit Part Stock':'Add Part to Stock',`
    <input type="hidden" id="eStId" value="${d.id||''}">
    <div class="fg"><label>Part Name</label><input class="fc" id="stNm" value="${E(d.name||'')}"></div>
    <div class="fr"><div class="fg"><label>Quantity in Stock</label><input class="fc" type="number" id="stQ" value="${d.qty||0}" min="0"></div><div class="fg"><label>Reorder When ≤</label><input class="fc" type="number" id="stR" value="${d.reorderAt||1}" min="0"></div></div>
    <div class="fg"><label>Notes (supplier, part code, location...)</label><textarea class="fc" id="stN">${E(d.notes||'')}</textarea></div>
  `,`<button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveStock()">Save</button>`);
}

function saveStock(){
  const eid=document.getElementById('eStId').value;
  const d={name:document.getElementById('stNm').value.trim(),qty:parseInt(document.getElementById('stQ').value)||0,reorderAt:parseInt(document.getElementById('stR').value)||1,notes:document.getElementById('stN').value.trim()};
  if(!d.name){toast('Name required.','error');return;}
  if(eid){const i=DB.partsStock.findIndex(s=>s.id===parseInt(eid));if(i>=0)DB.partsStock[i]={...DB.partsStock[i],...d};}
  else{d.id=DB.nPS++;DB.partsStock.push(d);}
  saveDB();closeModal();renderParts();toast('Stock saved.','success');
}

function adjustStock(id,delta){
  const s=DB.partsStock.find(x=>x.id===id);if(!s)return;
  s.qty=Math.max(0,s.qty+delta);saveDB();renderParts();
}

function delStock(id){
  if(!confirm('Remove from stock?'))return;
  DB.partsStock=DB.partsStock.filter(s=>s.id!==id);saveDB();renderParts();toast('Removed.','info');
}

function renderPOTracking(){
  const pos=[...(DB.pos||[])].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

    <div id="poTrkList">${renderPOTrkCards(pos)}</div></div>`;

function renderPOTrkCards(pos){

    // Find linked service reports: match by poNo OR jobId
    const linkedReports=DB.reports.filter(r=>(p.poNo&&r.poNo===p.poNo)||(p.jobId&&r.jobId===p.jobId));
    return `<div class="rpt-card">
      <div class="rpt-card-top"><span style="font-weight:700">📄 ${E(p.poNo)}</span><span class="bd" style="background:${statusColor};color:#fff">${E(jobStatus)}</span></div>
      <div class="rpt-card-row"><span class="rc-label">Date</span><span class="rc-val">${E(p.date||'—')}</span></div>
      <div class="rpt-card-row"><span class="rc-label">Customer</span><span class="rc-val">${E(p.customer)}</span></div>
      ${p.title?`<div class="rpt-card-row"><span class="rc-label">Title</span><span class="rc-val">${E(p.title)}</span></div>`:''}
      ${p.type?`<div class="rpt-card-row"><span class="rc-label">Type</span><span class="rc-val">${E(p.type)}</span></div>`:''}
      ${p.model||p.serial?`<div class="rpt-card-row"><span class="rc-label">Machine</span><span class="rc-val">${E(p.model||'')} ${p.serial?' / '+E(p.serial):''}</span></div>`:''}
      <div class="rpt-card-row"><span class="rc-label">Linked Job</span><span class="rc-val">${job?`<a href="#" onclick="event.preventDefault();showJobById(${job.id})" style="color:var(--ac);text-decoration:none">JOB-${String(job.id).padStart(4,'0')} →</a>`:'<em style="color:var(--er)">deleted</em>'}</span></div>
      <div class="rpt-card-row"><span class="rc-label">Service Reports</span><span class="rc-val" style="text-align:right">${linkedReports.length?linkedReports.map(r=>`<a href="#" onclick="event.preventDefault();viewRptPreview(${r.id})" style="color:var(--ok);text-decoration:none;font-weight:600;display:inline-block;margin-left:6px">📋 ${E(r.jobNo)} →</a>`).join(''):'<em style="color:var(--t3)">none yet</em>'}</span></div>

function filterPOTrk(){
  const s=(document.getElementById('poTrkSrch')?.value||'').toLowerCase();
  const pos=[...(DB.pos||[])].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''))
    .filter(p=>(p.poNo+' '+p.customer+' '+(p.title||'')+' '+(p.desc||'')+' '+(p.serial||'')+' '+(p.model||'')).toLowerCase().includes(s));

function delPO(id){
  if(!confirm('Delete this PO record? (The linked job will NOT be deleted.)'))return;
  DB.pos=DB.pos.filter(p=>p.id!==id);

function parsePOText(){
  const t=document.getElementById('poRaw').value;if(!t.trim()){toast('Paste PO text first.','error');return;}
  // Crude regex extraction
  const m={
    po:t.match(/P\.?O\.?\s*(?:Num|No\.?|#)?\s*:?\s*([A-Z0-9\-\/]{3,})/i),
    cust:t.match(/(?:Customer|Bill\s*To|Company|Buyer)\s*:?\s*([A-Za-z0-9 \.\-&]{3,80})/i),
    serial:t.match(/(?:S\/?N|Serial)\s*:?\s*([A-Z0-9]{4,})/i),
    model:t.match(/(?:Model|Equipment)\s*:?\s*([A-Z0-9\-]{3,})/i),
    date:t.match(/(20\d{2}[\-\/]\d{1,2}[\-\/]\d{1,2})/),
  };
  if(m.po)document.getElementById('poNum').value=m.po[1].trim();
  if(m.serial)document.getElementById('poSer').value=m.serial[1].trim();
  if(m.model)document.getElementById('poModel').value=m.model[1].trim();
  if(m.date)document.getElementById('poDate').value=m.date[1].replace(/\//g,'-');
  if(m.cust){
    const candidate=m.cust[1].trim();
    const sel=document.getElementById('poCust');
    const matched=[...sel.options].find(o=>o.value&&(o.value.toLowerCase().includes(candidate.toLowerCase())||candidate.toLowerCase().includes(o.value.toLowerCase())));
    if(matched)sel.value=matched.value;
  }
  // Use first ~5 lines as job description if not set
  const desc=document.getElementById('poDesc');
  if(!desc.value){desc.value=t.split('\n').slice(0,8).join('\n').substring(0,500);}
  toast('Parsed. Review fields before creating job.','success');
}

// ===== PO AI SCAN (Gemini) =====
let poScanBase64=null,poScanIsPDF=false;

function savePoApiKey(){
  const key=document.getElementById('poApiKeyInput').value.trim();
  if(key){
    localStorage.setItem('ocrm4_gemini_key',key);
    document.getElementById('poApiKeyStatus').innerHTML='<span style="color:var(--ok)">✓ Key saved</span>';
    toast('Gemini API key saved.','success');
  }else{
    localStorage.removeItem('ocrm4_gemini_key');
    document.getElementById('poApiKeyStatus').innerHTML='<span style="color:var(--er)">Not set</span>';
    toast('API key removed.','info');
  }
}

function procPOScan(f){
  if(!f)return;
  poScanIsPDF=f.type==='application/pdf';
  const reader=new FileReader();
  reader.onload=function(e){
    poScanBase64=e.target.result;
    const prev=document.getElementById('poScPrev');
    const img=document.getElementById('poScPreviewImg');
    if(poScanIsPDF){
      img.style.display='none';
      img.src='';
      // remove any existing banner
      document.getElementById('poPdfBanner')?.remove();
      prev.insertAdjacentHTML('afterbegin',`<div id="poPdfBanner" style="padding:18px;background:var(--ers);border-radius:var(--r);text-align:center;margin-bottom:10px"><div style="font-size:28px;margin-bottom:6px">📄</div><div style="font-size:var(--fs);font-weight:700">${E(f.name)}</div><div style="font-size:var(--fs-sm);color:var(--t2);margin-top:4px">${(f.size/1024).toFixed(0)} KB — PDF will be sent to AI</div></div>`);
      prev.style.display='block';
      setTimeout(()=>sendPOToAI(),400);
    }else{
      document.getElementById('poPdfBanner')?.remove();
      img.style.display='block';
      img.src=poScanBase64;
      prev.style.display='block';
    }
  };
  reader.readAsDataURL(f);
}

function resetPOScan(){
  poScanBase64=null;poScanIsPDF=false;
  document.getElementById('poScPrev').style.display='none';
  document.getElementById('poScProc').style.display='none';
  document.getElementById('poScIn').value='';
  document.getElementById('poScInG').value='';
  document.getElementById('poPdfBanner')?.remove();
}

async function sendPOToAI(){
  const apiKey=localStorage.getItem('ocrm4_gemini_key');
  if(!apiKey){toast('Enter your Gemini API key first.','error');document.getElementById('poApiKeyInput')?.focus();return;}
  if(!poScanBase64){toast('Upload a PO image or PDF first.','error');return;}

  const procEl=document.getElementById('poScProc');
  procEl.style.display='block';
  document.getElementById('poScProcMsg').textContent='🤖 Gemini AI is reading your PO...';

  const base64Data=poScanBase64.split(',')[1];
  const mimeType=poScanIsPDF?'application/pdf':(poScanBase64.startsWith('data:image/png')?'image/png':'image/jpeg');

  const custList=getAllCusts().map(c=>c.name).slice(0,80);
  const prompt=`You are reading a Purchase Order (PO) document. Read every printed and handwritten field carefully.

Extract ALL information and return ONLY a valid JSON object with these exact keys (use empty string "" if a field is not found):

{
  "poNum": "The PO number (look for PO No, P.O., Purchase Order No, Order #)",
  "date": "PO date in YYYY-MM-DD format",
  "customer": "Buyer / Bill-To / Customer company name only (no address)",
  "address": "Buyer / Bill-To address if visible",
  "contact": "Contact person name if visible",
  "contactPhone": "Contact phone number if visible",
  "title": "Short job title / subject (e.g. 'PM Service for ET2200PPS')",
  "desc": "Full scope of work / description / line items (combined)",
  "model": "Equipment model if mentioned",
  "serial": "Serial number if mentioned",
  "type": "One of: Preventive Maintenance, Corrective Maintenance, Breakdown Call, Follow-Up Call, Installation",
  "priority": "One of: Low, Medium, High (default Medium)"
}

Known customer names in our system (try to match exactly if buyer is close to one): ${custList.join(' | ')}

CRITICAL: Return ONLY the raw JSON object. No markdown fences, no backticks, no explanation.`;

  try{
    const response=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{inline_data:{mime_type:mimeType,data:base64Data}},{text:prompt}]}],
        generationConfig:{temperature:0.1,maxOutputTokens:2000}
      })
    });
    if(!response.ok){
      const errData=await response.json().catch(()=>({}));
      throw new Error(errData.error?.message||`HTTP ${response.status}`);
    }
    const data=await response.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!text)throw new Error('Empty response from Gemini');
    const clean=text.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    const parsed=JSON.parse(clean);
    document.getElementById('poScProcMsg').textContent='✅ Extraction complete!';
    setTimeout(()=>{procEl.style.display='none';applyPOExtract(parsed);},500);
  }catch(err){
    console.error('PO AI scan error:',err);
    const errMsg=err.message||'Unknown error';
    if(errMsg.includes('API_KEY_INVALID')||errMsg.includes('401')||errMsg.includes('403')){
      document.getElementById('poScProcMsg').textContent='❌ Invalid API key.';
    }else if(errMsg.includes('429')||errMsg.includes('RATE_LIMIT')){
      document.getElementById('poScProcMsg').textContent='⏳ Rate limited (15/min free). Retry shortly.';
    }else if(errMsg.includes('JSON')){
      document.getElementById('poScProcMsg').textContent='⚠️ AI could not parse the PO. Try a clearer image.';
    }else{
      document.getElementById('poScProcMsg').textContent='⚠️ '+errMsg;
    }
    setTimeout(()=>{procEl.style.display='none';},2500);
  }
}

function applyPOExtract(d){
  if(d.poNum)document.getElementById('poNum').value=d.poNum;
  if(d.date){
    // normalize to YYYY-MM-DD
    let dt=d.date.replace(/\//g,'-');
    if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(dt)){
      const p=dt.split('-');dt=`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
      document.getElementById('poDate').value=dt;
    }
  }
  if(d.customer){
    const sel=document.getElementById('poCust');
    const cand=d.customer.trim().toLowerCase();
    const opt=[...sel.options].find(o=>o.value&&(o.value.toLowerCase()===cand||o.value.toLowerCase().includes(cand)||cand.includes(o.value.toLowerCase())));
    if(opt){sel.value=opt.value;}
    else{
      // No match — offer to create
      const create=confirm(`Customer "${d.customer}" not found in your list. Add as new customer?`);
      if(create){
        if(!Array.isArray(DB.custs))DB.custs=[];
        DB.custs.push({id:DB.nC++,name:d.customer.trim(),address:d.address||'',contact:d.contact||'',phone:d.contactPhone||'',email:'',agent:''});
        saveDB();
        // re-render dropdown options
        sel.innerHTML='<option value="">— Select —</option>'+getAllCusts().map(c=>`<option>${E(c.name)}</option>`).join('');
        sel.value=d.customer.trim();
        toast('New customer added.','success');
      }
    }
  }
  if(d.title)document.getElementById('poTitle').value=d.title;
  if(d.desc)document.getElementById('poDesc').value=d.desc;
  if(d.model)document.getElementById('poModel').value=d.model;
  if(d.serial)document.getElementById('poSer').value=d.serial;
  if(d.type){
    const tSel=document.getElementById('poType');
    const tOpt=[...tSel.options].find(o=>o.value.toLowerCase()===d.type.toLowerCase());
    if(tOpt)tSel.value=tOpt.value;
  }
  if(d.priority){
    const pSel=document.getElementById('poPri');
    const pOpt=[...pSel.options].find(o=>o.value.toLowerCase()===d.priority.toLowerCase());
    if(pOpt)pSel.value=pOpt.value;
  }
  toast('PO fields populated. Review then click Create Job.','success');
  // scroll to PO Details
  document.getElementById('poNum').scrollIntoView({behavior:'smooth',block:'center'});
}

    model:document.getElementById('poModel').value.trim(),
    chargeable:'Chargeable',
    poNo:poNum,
    techIds:[],techId:null,
    type:document.getElementById('poType').value,
    priority:document.getElementById('poPri').value,
    date:document.getElementById('poDate').value,

    priority:document.getElementById('poPri').value,
    status:'Open',
    jobId:j.id,

  DB.pos.push(po);

  toast(`PO ${poNum} tracked. Job JOB-${String(j.id).padStart(4,'0')} created.`,'success');

// ===== AUTO-PM SCHEDULING =====
// Runs on app load — creates Open jobs 2 weeks before due dates
function autoSchedulePM(){
  if(!Array.isArray(DB.machines)||!DB.machines.length)return;
  const today=new Date();
  const horizonDays=14;
  let created=0;
  DB.machines.forEach(m=>{
    if(!m.maintFrequency)return;
    const freq=parseFloat(m.maintFrequency);if(!freq||freq<=0)return;
    const intervalMonths=Math.round(12/freq);
    // Find last service for this machine
    const lastRpt=DB.reports.filter(r=>r.serial===m.serial&&r.type==='Preventive Maintenance').sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
    const lastDate=lastRpt?new Date(lastRpt.date):(m.installDate?new Date(m.installDate):null);
    if(!lastDate||isNaN(lastDate))return;
    const nextDue=new Date(lastDate);nextDue.setMonth(nextDue.getMonth()+intervalMonths);
    // If overdue, advance to next future cycle (so we always check the next upcoming due date)
    while(nextDue<today){nextDue.setMonth(nextDue.getMonth()+intervalMonths);}
    const diffDays=Math.round((nextDue-today)/(1000*60*60*24));
    if(diffDays<0||diffDays>horizonDays)return;
    // Check if a PM job already exists for this serial in this window
    const dueISO=nextDue.toISOString().split('T')[0];
    const existing=DB.jobs.find(j=>j.machine===m.serial&&j.type==='Preventive Maintenance'&&j.date===dueISO&&j.status!=='Completed');
    if(existing)return;
    // Auto-create
    const c=DB.custs.find(x=>x.name===m.customer)||{};
    DB.jobs.push({
      id:DB.nJ++,
      title:`Scheduled PM — ${m.model} (${m.serial})`,
      customer:m.customer,
      address:c.address||m.location||'',
      contact:c.contact||'',contactPhone:c.phone||'',
      machine:m.serial,model:m.model,
      chargeable:getWarrantyStatus(m.serial).foc?'FOC':'Chargeable',
      poNo:'',techIds:[],techId:null,
      type:'Preventive Maintenance',priority:'Medium',
      date:dueISO,time:'',
      desc:`Auto-scheduled PM. Last service: ${lastRpt?lastRpt.date:'(install date)'}. Frequency: ${freq}/year.`,
      status:'Open',
      createdAt:new Date().toISOString(),
      waSent:false,startTime:null,endTime:null,followUp:'',
      autoScheduled:true
    });
    created++;
  });
  if(created>0){saveDB();toast(`Auto-scheduled ${created} upcoming PM job(s).`,'info');}
}

// Compute PM status for a single machine. Returns {hasFreq, intervalMonths, lastDate, nextDue, daysUntil, statusLabel, statusColor}
function getPMStatus(m){
  const out={hasFreq:false,intervalMonths:0,lastDate:null,nextDue:null,daysUntil:null,statusLabel:'No schedule',statusColor:'var(--t3)'};
  if(!m.maintFrequency)return out;
  const freq=parseFloat(m.maintFrequency);if(!freq||freq<=0)return out;
  out.hasFreq=true;
  out.intervalMonths=Math.round(12/freq);
  const lastRpt=DB.reports.filter(r=>r.serial===m.serial&&r.type==='Preventive Maintenance').sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
  const lastDate=lastRpt?lastRpt.date:(m.installDate||'');
  if(!lastDate)return out;
  out.lastDate=lastDate;
  const ld=new Date(lastDate);if(isNaN(ld))return out;
  const nd=new Date(ld);nd.setMonth(nd.getMonth()+out.intervalMonths);
  const today=new Date();today.setHours(0,0,0,0);
  out.nextDue=nd.toISOString().split('T')[0];
  out.daysUntil=Math.round((nd-today)/86400000);
  if(out.daysUntil<0){out.statusLabel='⚠ Overdue since '+out.nextDue;out.statusColor='var(--er)';}
  else if(out.daysUntil<=14){out.statusLabel='Due in '+out.daysUntil+'d';out.statusColor='var(--wn)';}
  else if(out.daysUntil<=30){out.statusLabel='Due in '+out.daysUntil+'d';out.statusColor='var(--ac)';}
  else{out.statusLabel='OK ('+out.daysUntil+'d)';out.statusColor='var(--ok)';}
  return out;
}

// CSV helpers
function escCSV(v){
  if(v===null||v===undefined)return'';
  const s=String(v);
  if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}

function toCSV(headers,rows){
  return[headers.map(escCSV).join(','),...rows.map(r=>headers.map(h=>escCSV(r[h])).join(','))].join('\n');
}

function downloadFile(content,filename,type){
  const blob=new Blob([content],{type:type||'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  URL.revokeObjectURL(a.href);
}

function exportCSV(table){
  let headers,rows;
  const ts=new Date().toISOString().split('T')[0];
  
  switch(table){
    case 'customers':
      headers=['id','name','address','contact','phone','email','agent'];
      rows=DB.custs;break;
    case 'machines':
      headers=['id','serial','model','category','customer','location','installDate','warranty','purchaseRental','serviceContract','maintFrequency'];
      rows=DB.machines||[];break;
    case 'reports':
      headers=['id','company','jobNo','date','customer','contact','contactNum','model','serial','machines','engineer','type','timeStart','timeEnd','remarks','recommendations','status','nextVisit','checklist','checklists'];
      rows=DB.reports.map(r=>({...r,machines:(Array.isArray(r.machines)&&r.machines.length)?JSON.stringify(r.machines):'',checklist:r.checklist?JSON.stringify(r.checklist):'',checklists:(Array.isArray(r.checklists)&&r.checklists.length)?JSON.stringify(r.checklists):''}));break;
    case 'jobs':
      headers=['id','title','customer','machine','model','machineCategory','type','priority','date','time','status','desc','techNames'];
      rows=DB.jobs.map(j=>({...j,techNames:getJobTechNames(j)}));break;
    case 'technicians':
      headers=['id','name','phone','email','spec'];
      rows=DB.techs;break;
    case 'agents':
      headers=['id','name','type','address','contact','phone','email'];
      rows=DB.agents||[];break;
    case 'companies':
      headers=['key','name','addr','tel','email','uen','color','tag'];
      rows=['octopack','jw','redbox'].map(k=>({key:k,...CO[k]}));break;
    case 'inventory':
      headers=['id','name','qty','reorderAt','notes'];
      rows=DB.partsStock||[];break;
    case 'pos':
      headers=['id','poNo','date','customer','address','contact','contactPhone','title','desc','model','serial','type','priority','status','jobId','createdAt'];
      rows=DB.pos||[];break;
    default:return;
  }
  
  const csv=toCSV(headers,rows);
  downloadFile(csv,`octocrm_${table}_${ts}.csv`);
  toast(`Exported ${rows.length} ${table}.`,'success');
}

function parseCSV(text){
  const lines=[];
  let current='';let inQuote=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){
      if(inQuote&&text[i+1]==='"'){current+='"';i++;}
      else inQuote=!inQuote;
    }else if(c==='\n'&&!inQuote){
      lines.push(current);current='';
    }else{current+=c;}
  }
  if(current.trim())lines.push(current);
  
  return lines.map(line=>{
    const cells=[];let cell='';let q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(q&&line[i+1]==='"'){cell+='"';i++;}else q=!q;}
      else if(c===','&&!q){cells.push(cell);cell='';}
      else{cell+=c;}
    }
    cells.push(cell);
    return cells.map(c=>c.trim());
  });
}

// ===== DUPLICATE DETECTION & CLEANUP =====
function strSim(a,b){
  // Simple similarity score 0-1 using Levenshtein-like comparison
  if(!a||!b)return 0;
  a=a.toLowerCase().trim();b=b.toLowerCase().trim();
  if(a===b)return 1;
  // Check if one contains the other
  if(a.includes(b)||b.includes(a))return 0.85;
  // Word overlap
  const wa=new Set(a.split(/\s+/));const wb=new Set(b.split(/\s+/));
  let common=0;wa.forEach(w=>{if(wb.has(w))common++;});
  const wordSim=common/Math.max(wa.size,wb.size);
  // Character-level comparison
  let matches=0;const shorter=a.length<b.length?a:b;const longer=a.length<b.length?b:a;
  for(let i=0;i<shorter.length;i++){if(longer.includes(shorter[i]))matches++;}
  const charSim=matches/longer.length;
  return Math.max(wordSim,charSim*0.8);
}

function findDuplicates(){
  const dupes={customers:[],machines:[],addresses:[]};
  const custs=DB.custs||[];
  const machines=DB.machines||[];
  
  // Find similar customer names
  for(let i=0;i<custs.length;i++){
    for(let j=i+1;j<custs.length;j++){
      const sim=strSim(custs[i].name,custs[j].name);
      if(sim>=0.7){dupes.customers.push({a:custs[i],b:custs[j],sim:Math.round(sim*100)});}
    }
  }
  
  // Find duplicate machine serials
  const serialMap={};
  machines.forEach(m=>{
    if(!serialMap[m.serial])serialMap[m.serial]=[];
    serialMap[m.serial].push(m);
  });
  Object.entries(serialMap).forEach(([serial,list])=>{
    if(list.length>1)dupes.machines.push({serial,items:list});
  });
  
  // Find similar addresses across different customers
  for(let i=0;i<custs.length;i++){
    for(let j=i+1;j<custs.length;j++){
      if(!custs[i].address||!custs[j].address)continue;
      const sim=strSim(custs[i].address,custs[j].address);
      if(sim>=0.75&&custs[i].name!==custs[j].name){
        dupes.addresses.push({a:custs[i],b:custs[j],sim:Math.round(sim*100)});
      }
    }
  }
  
  return dupes;
}

        <button class="btn btn-sm btn-s" onclick="this.closest('div[style]').remove()">Dismiss</button></div>
      </div>`;
    });
  }
  
  // Similar addresses
  if(dupes.addresses.length){
    html+=`<h3 style="margin:16px 0 12px;color:var(--pu)">📍 Similar Addresses (${dupes.addresses.length})</h3>`;

        <div style="margin-top:8px"><button class="btn btn-sm btn-s" onclick="this.closest('div[style]').remove()">Dismiss</button></div>

function mergeCusts(keepId,keepName,removeId,removeName){
  if(!confirm(`Merge "${removeName}" into "${keepName}"?\n\nAll machines, reports, and jobs under "${removeName}" will be updated to "${keepName}".`))return;
  // Update all references
  (DB.machines||[]).forEach(m=>{if(m.customer===removeName)m.customer=keepName;});
  DB.reports.forEach(r=>{if(r.customer===removeName)r.customer=keepName;});
  DB.jobs.forEach(j=>{if(j.customer===removeName)j.customer=keepName;});
  // Merge contact info if keep is empty
  const keep=DB.custs.find(c=>c.id===keepId);
  const remove=DB.custs.find(c=>c.id===removeId);
  if(keep&&remove){
    if(!keep.contact&&remove.contact)keep.contact=remove.contact;
    if(!keep.phone&&remove.phone)keep.phone=remove.phone;
    if(!keep.email&&remove.email)keep.email=remove.email;
    if(!keep.address&&remove.address)keep.address=remove.address;
    if(!keep.agent&&remove.agent)keep.agent=remove.agent;
  }
  // Remove the duplicate
  DB.custs=DB.custs.filter(c=>c.id!==removeId);
  saveDB();closeModal();renderCusts();renderMachines();
  toast(`Merged "${removeName}" → "${keepName}"`,'success');
  // Re-check
  setTimeout(()=>showDuplicateCheck(),500);
}

function mergeSerials(serial){
  const items=(DB.machines||[]).filter(m=>m.serial===serial);
  if(items.length<=1)return;
  if(!confirm(`Keep first entry for S/N "${serial}" and remove ${items.length-1} duplicate(s)?`))return;
  // Keep the first, remove the rest
  const keepId=items[0].id;
  DB.machines=DB.machines.filter(m=>m.serial!==serial||m.id===keepId);
  saveDB();closeModal();renderMachines();
  toast(`Removed ${items.length-1} duplicate(s) for S/N ${serial}`,'success');
  setTimeout(()=>showDuplicateCheck(),500);
}

function mmToggle(role,id){
  const st=window._mmState;if(!st)return;
  if(role==='keep'){
    // Toggling keep on/off
    if(st.keepId===id){st.keepId=null;}
    else{
      if(st.delId===id)st.delId=null; // can't be both
      st.keepId=id;
    }
  }else{
    if(st.delId===id){st.delId=null;}
    else{
      if(st.keepId===id)st.keepId=null;
      st.delId=id;
    }
  }
  renderMMList();
}

function mmPick(role,id){mmToggle(role,id);}

function updMMSummary(){
  const st=window._mmState;if(!st)return;
  const meta=MERGE_META[st.kind];const items=meta.list();
  const keep=st.keepId!=null?items.find(x=>x[meta.key]===st.keepId):null;
  const del=st.delId!=null?items.find(x=>x[meta.key]===st.delId):null;
  document.getElementById('mmKeepLbl').textContent=keep?meta.label(keep):'— pick from list —';
  document.getElementById('mmDelLbl').textContent=del?meta.label(del):'— pick from list —';
  const btn=document.getElementById('mmGo');
  if(btn){const ok=keep&&del&&keep!==del;btn.disabled=!ok;btn.style.opacity=ok?'1':'.5';}
}

function doManualMerge(){
  const st=window._mmState;if(!st){toast('No selection.','error');return;}
  const meta=MERGE_META[st.kind];if(!meta)return;
  if(st.keepId==null||st.delId==null){toast('Pick both KEEP and DELETE.','error');return;}
  if(st.keepId===st.delId){toast('Pick two different records.','error');return;}
  const kind=st.kind;
  const items=meta.list();
  const keep=items.find(x=>x[meta.key]===st.keepId);
  const del=items.find(x=>x[meta.key]===st.delId);
  if(!keep||!del){toast('Records not found.','error');return;}
  if(!confirm(`Merge "${meta.label(del)}"\n→ into "${meta.label(keep)}"?\n\nThe merged record will be DELETED and all references updated.\n\nThis cannot be undone.`))return;

  // Fill empty fields in keep from del
  Object.keys(del).forEach(k=>{if(k!==meta.key&&(keep[k]===''||keep[k]===null||keep[k]===undefined)&&del[k]!==''&&del[k]!==null&&del[k]!==undefined){keep[k]=del[k];}});

  if(kind==='customers'){
    const keepName=keep.name,delName=del.name;
    (DB.machines||[]).forEach(m=>{if(m.customer===delName)m.customer=keepName;});
    DB.reports.forEach(r=>{if(r.customer===delName)r.customer=keepName;});
    DB.jobs.forEach(j=>{if(j.customer===delName)j.customer=keepName;});
    (DB.parts||[]).forEach(p=>{if(p.customer===delName)p.customer=keepName;});
    (DB.pos||[]).forEach(p=>{if(p.customer===delName)p.customer=keepName;});
    DB.custs=DB.custs.filter(c=>c.id!==st.delId);
  }else if(kind==='machines'){
    const keepSer=keep.serial,delSer=del.serial;
    if(keepSer!==delSer){
      DB.reports.forEach(r=>{if(r.serial===delSer)r.serial=keepSer;});
      DB.jobs.forEach(j=>{if(j.machine===delSer)j.machine=keepSer;});
      (DB.parts||[]).forEach(p=>{if(p.serial===delSer)p.serial=keepSer;});
      (DB.pos||[]).forEach(p=>{if(p.serial===delSer)p.serial=keepSer;});
    }
    DB.machines=DB.machines.filter(m=>m.id!==st.delId);
  }else if(kind==='inventory'){
    keep.qty=(keep.qty||0)+(del.qty||0);
    if((del.reorderAt||0)>(keep.reorderAt||0))keep.reorderAt=del.reorderAt;
    if(del.notes&&!keep.notes)keep.notes=del.notes;
    DB.partsStock=DB.partsStock.filter(s=>s.id!==st.delId);
  }else if(kind==='agents'){
    const keepName=keep.name,delName=del.name;
    DB.custs.forEach(c=>{if(c.agent===delName)c.agent=keepName;});
    DB.agents=DB.agents.filter(a=>a.id!==st.delId);
  }

  saveDB();closeModal();
  window._mmState=null;
  if(kind==='customers')renderCusts();
  else if(kind==='machines')renderMachines();
  else if(kind==='inventory')renderParts();
  else if(kind==='agents')renderAgents();
  toast(`Merged. "${meta.label(del).substring(0,40)}" removed.`,'success');
}

function saveSeedData(){
  if(!confirm('Save current database as seed baseline?\nThis will overwrite any previous seed.'))return;

  // Estimate size first
  let payload;
  try{payload=JSON.stringify({data:DB,savedAt:new Date().toISOString()});}
  catch(e){toast('Could not serialize data: '+e.message,'error');return;}

  const sizeMB=(payload.length/1024/1024).toFixed(2);
  // Try direct save first
  try{
    localStorage.setItem('ocrm4_seed',payload);
    toast(`Seed saved (${sizeMB} MB). Reset will restore to this point.`,'success');
    renderDataMgmt();return;
  }catch(e){
    // QuotaExceededError — offer slim version
    const slim=JSON.parse(JSON.stringify(DB));
    let stripped=0;
    (slim.reports||[]).forEach(r=>{
      if(Array.isArray(r.photos)&&r.photos.length){stripped+=r.photos.length;r.photos=[];}
      if(r.signatureEng){delete r.signatureEng;stripped++;}
      if(r.signatureCust){delete r.signatureCust;stripped++;}
    });
    (slim.jobs||[]).forEach(j=>{
      if(Array.isArray(j.photos)&&j.photos.length){stripped+=j.photos.length;j.photos=[];}
    });
    const slimPayload=JSON.stringify({data:slim,savedAt:new Date().toISOString(),slim:true});
    const slimMB=(slimPayload.length/1024/1024).toFixed(2);
    if(!confirm(`⚠ Data too large for localStorage (${sizeMB} MB exceeds browser limit ~5 MB).\n\nSave SLIM version (${slimMB} MB) without photos & signatures? Records will be preserved, only images stripped.\n\n${stripped} image(s) will be excluded from seed.`)){toast('Seed save cancelled.','info');return;}
    try{
      localStorage.setItem('ocrm4_seed',slimPayload);
      toast(`Slim seed saved (${slimMB} MB, ${stripped} images stripped).`,'success');
      renderDataMgmt();
    }catch(e2){
      // Still too big — give clear guidance
      toast(`Save failed: localStorage quota exceeded. Use Export All JSON instead (no size limit).`,'error');
    }
  }
}
function loadSeedData(){
  const raw=localStorage.getItem('ocrm4_seed');
  if(!raw){toast('No seed data found. Save one first.','error');return;}
  if(!confirm('Load seed data? This will REPLACE your current data.'))return;
  try{
    const seed=JSON.parse(raw);
    DB=JSON.parse(JSON.stringify(seed.data));
    saveDB();refreshPage();
    toast(seed.slim?'Slim seed loaded (photos/signatures were not included).':'Seed data loaded.','success');
  }catch(e){toast('Failed to parse seed data: '+e.message,'error');}
}
function clearSeedData(){
  if(!confirm('Clear saved seed data?'))return;
  localStorage.removeItem('ocrm4_seed');
  toast('Seed data cleared.','info');renderDataMgmt();
}

function resetAllData(){
  const hasSeed=!!localStorage.getItem('ocrm4_seed');
  const msg=hasSeed
    ?'This will reset data to your saved seed baseline.\n\nProceed?'
    :'This will DELETE all reports, jobs, customers, and settings.\n\nAre you sure?';
  if(!confirm(msg))return;
  if(!hasSeed&&!confirm('FINAL WARNING: All data will be permanently erased from this device AND the cloud database.\n\nProceed?'))return;
  if(hasSeed){
    // Restore from seed
    try{
      const seed=JSON.parse(localStorage.getItem('ocrm4_seed'));
      DB=JSON.parse(JSON.stringify(seed.data));
      localStorage.setItem('ocrm4',JSON.stringify(DB));
      if(USE_FB&&fbDB)fbDB.ref('octoCRM_v4').set(DB).then(()=>location.reload()).catch(()=>location.reload());
      else location.reload();
    }catch(e){toast('Seed restore failed.','error');}
  } else {
    // Full wipe
    localStorage.removeItem('ocrm4');
    localStorage.removeItem('ocrm4_session');
    try{
      if(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length){
        firebase.database().ref('octoCRM_v4').remove().then(()=>{location.reload();}).catch(()=>{location.reload();});
      }else{location.reload();}
    }catch(e){location.reload();}
  }
}

async function generateReportPDF(reportData, download){
  // Check libs
  checkPDFLibs();
  if(!pdfLibsReady){
    // One more try - maybe they're still loading
    await new Promise(r=>setTimeout(r,2000));
    checkPDFLibs();
    if(!pdfLibsReady){
      toast('PDF libraries not available. Please reload the page.','error');
      return null;
    }
  }
  
  toast('Generating PDF...','info');
  
  // Create a hidden container for rendering
  const container=document.createElement('div');
  container.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1;';
  container.innerHTML=buildReportHTMLForPDF(reportData);
  document.body.appendChild(container);
  
  try{
    const el=container.querySelector('#pdfContent');
    // Find all keep-together regions (sig block, checklist header etc.)
    const keepEls=Array.from(el.querySelectorAll('[data-keep="true"], #sigBlock'));
    const elTop=el.getBoundingClientRect().top;
    const scale=2;
    // Capture each keep region's CSS-pixel range (relative to el top)
    const keepRanges=keepEls.map(k=>{const rc=k.getBoundingClientRect();return{top:(rc.top-elTop),height:rc.height};});

    const canvas=await html2canvas(el,{scale:scale,useCORS:true,logging:false,backgroundColor:'#ffffff'});

    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pdfW=pdf.internal.pageSize.getWidth();
    const pdfH=pdf.internal.pageSize.getHeight();
    const imgW=pdfW-20;
    const imgH=(canvas.height*imgW)/canvas.width;

    const pages=[]; // array of {srcY, srcH} in canvas coordinates

    if(imgH<=pdfH-20){
      // Single-page case
      pages.push({srcY:0,srcH:canvas.height});
    }else{
      const pageImgH=pdfH-20;
      const srcPageH=(pageImgH/imgH)*canvas.height; // canvas pixels per PDF page
      // Convert keep ranges to canvas pixels — but only if block fits on a single page
      const keepInCanv=keepRanges.map(k=>({top:k.top*scale,bot:(k.top+k.height)*scale,h:k.height*scale})).filter(k=>k.h<srcPageH*0.95);
      let y=0;
      let safety=0;
      while(y<canvas.height-1 && safety<60){
        safety++;
        let nextY=Math.min(y+srcPageH,canvas.height);
        // If a keep block would be cut by this boundary, push the boundary to its top
        for(const k of keepInCanv){
          if(nextY>k.top && nextY<k.bot && y<=k.top){
            nextY=k.top;
            break;
          }
        }
        if(nextY<=y)nextY=Math.min(y+srcPageH,canvas.height); // safeguard
        pages.push({srcY:y,srcH:nextY-y});
        y=nextY;
      }
    }

    const totalPages=pages.length;
    pages.forEach((p,i)=>{
      if(i>0)pdf.addPage();
      const pageCanvas=document.createElement('canvas');
      pageCanvas.width=canvas.width;
      pageCanvas.height=p.srcH;
      const pCtx=pageCanvas.getContext('2d');
      pCtx.fillStyle='#ffffff';
      pCtx.fillRect(0,0,pageCanvas.width,pageCanvas.height);
      pCtx.drawImage(canvas,0,p.srcY,canvas.width,p.srcH,0,0,canvas.width,p.srcH);
      const pageImg=pageCanvas.toDataURL('image/jpeg',0.92);
      const h=(p.srcH*imgW)/canvas.width;
      pdf.addImage(pageImg,'JPEG',10,10,imgW,h);
      // Stamp page number bottom-right
      pdf.setFont('helvetica','normal');
      pdf.setFontSize(8);
      pdf.setTextColor(120,120,120);
      pdf.text(`Page ${i+1} of ${totalPages}`,pdfW-12,pdfH-6,{align:'right'});
    });

    const fileName=`Service_Report_${reportData.jobNo||'report'}.pdf`;

    if(download!==false){
      pdf.save(fileName);
      toast('PDF downloaded: '+fileName,'success');
    }

    document.body.removeChild(container);
    return {pdf,fileName,blob:pdf.output('blob')};
  }catch(err){
    console.error('PDF generation error:',err);
    document.body.removeChild(container);
    toast('PDF generation failed: '+err.message,'error');
    return null;
  }
}

async function downloadReportPDF(id){
  const r=DB.reports.find(x=>x.id===id);
  if(!r){toast('Report not found.','error');return;}
  await generateReportPDF(r,true);
}

async function emailReportPDF(id){
  const r=DB.reports.find(x=>x.id===id);
  if(!r){toast('Report not found.','error');return;}
  
  const result=await generateReportPDF(r,true);
  if(!result)return;
  
  // Open email client with instructions
  const co=CO[r.company]||CO.octopack;
  const cust=DB.custs.find(c=>c.name===r.customer);
  const toEmail=cust?.email||'';
  const subj=`Service Report ${r.jobNo} — ${r.type} — ${co.name}`;
  const body=`Dear ${r.contact||'Customer'},\n\nPlease find attached the service report PDF.\n\nJob No.: ${r.jobNo}\nDate: ${r.date}\nEquipment: ${r.model} (S/N: ${r.serial})\nType: ${r.type}\nStatus: ${r.status}\n\nRegards,\n${r.engineer||''}\n${co.name}`;
  
  // Try Web Share API first (mobile — can share PDF directly)
  if(navigator.share&&navigator.canShare){
    try{
      const file=new File([result.blob],result.fileName,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({title:subj,text:'Service Report '+r.jobNo,files:[file]});
        toast('Shared successfully!','success');
        return;
      }
    }catch(e){if(e.name!=='AbortError')console.warn('Share failed:',e);}
  }
  
  // Fallback: open mailto (PDF already downloaded)
  const cc=cust?.email?'':'';
  window.open(`mailto:${toEmail}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body+'\n\n📎 Please attach the downloaded PDF file: '+result.fileName)}`);
  toast('PDF downloaded. Attach it to the email.','info');
}

  const seedAgents = [{"name": "JW Supplies & Works Pte Ltd", "type": "Agent/Dealer"}, {"name": "Octopack SEA Pte Ltd", "type": "Agent/Dealer"}, {"name": "Megapac", "type": "Agent/Dealer"}, {"name": "Tradez Pte Ltd", "type": "Agent/Dealer"}, {"name": "GPI", "type": "Agent/Dealer"}, {"name": "RFA Industries Pte Ltd", "type": "Agent/Dealer"}, {"name": "Xcel", "type": "Agent/Dealer"}, {"name": "Sharp Win", "type": "Agent/Dealer"}, {"name": "Redbox Global Solutions Pte Ltd", "type": "Agent/Dealer"}, {"name": "Unipack", "type": "Agent/Dealer"}];

  let cAdded=0,cUpdated=0,mAdded=0,mSkip=0,aAdded=0;
  // Agents — fuzzy dedup (contains match for 'Octopack' etc)
  if(!Array.isArray(DB.agents))DB.agents=[];
  seedAgents.forEach(a=>{
    const nameUp=a.name.toUpperCase();
    const exists=DB.agents.find(x=>{const xu=x.name.toUpperCase();return xu===nameUp||xu.includes(nameUp)||nameUp.includes(xu);});
    if(!exists){
      DB.agents.push({id:DB.nA++,name:a.name,type:a.type||'Agent/Dealer',address:'',contact:'',phone:'',email:''});aAdded++;
    }
  });
  // Customers — fuzzy name match
  seedCusts.forEach(c=>{
    const ex=DB.custs.find(x=>x.name===c.name||x.name.toUpperCase()===c.name.toUpperCase());
    if(ex){
      if(!ex.address&&c.address)ex.address=c.address;
      if(!ex.contact&&c.contact)ex.contact=c.contact;
      if(!ex.agent&&c.agent)ex.agent=c.agent;
      // Normalize agent name if existing is a shorter variant
      if(ex.agent&&c.agent&&ex.agent!==c.agent){
        const eu=ex.agent.toUpperCase(),cu=c.agent.toUpperCase();
        if(cu.includes(eu)||eu.includes(cu)){ex.agent=c.agent;}
      }
      cUpdated++;
    }else{
      DB.custs.push({id:DB.nC++,name:c.name,address:c.address||'',contact:c.contact||'',phone:c.phone||'',email:c.email||'',agent:c.agent||''});cAdded++;
    }
  });
  // Machines
  if(!Array.isArray(DB.machines))DB.machines=[];
  seedMachines.forEach(m=>{

    const dup=DB.machines.find(x=>x.customer===m.customer&&x.model===m.model&&x.serial===m.serial);
    if(dup){mSkip++;return;}
    DB.machines.push({id:DB.nM++,serial:m.serial||'',model:m.model||'',category:m.category||'',customer:m.customer||'',location:m.location||'',installDate:m.installDate||'',warranty:m.warranty||'',purchaseRental:m.purchaseRental||'',serviceContract:m.serviceContract||'',maintFrequency:m.maintFrequency||''});mAdded++;
  });
  saveDB();
  toast(`XLSX Seed loaded: ${cAdded} new / ${cUpdated} updated customers, ${mAdded} machines added (${mSkip} dupes skipped), ${aAdded} agents.`,'success');
