function updateEmailPickers(){
  const custName=getFieldVal('crCu','crCuCustom');
  const cust=DB.custs.find(c=>c.name===custName)||getAllCusts().find(c=>c.name===custName);
  
  // Collect all available emails
  const toEmails=[];// For "Send To" (customer-side)
  const ccEmails=[];// For CC (technicians, company)
  
  // Customer email
  if(cust?.email)toEmails.push({label:cust.name,email:cust.email,color:'var(--ac)'});
  
  // Customer contact emails from past reports
  DB.reports.filter(r=>r.customer===custName).forEach(r=>{
    if(r.email&&!toEmails.find(e=>e.email===r.email))toEmails.push({label:'Previous',email:r.email,color:'var(--t2)'});
  });
  
  // Technician emails for CC
  (DB.techs||[]).forEach(t=>{
    if(t.email)ccEmails.push({label:t.name,email:t.email,color:'var(--ok)'});
  });
  
  // Company emails for CC
  Object.values(CO).forEach(co=>{
    if(co.email)ccEmails.push({label:co.name.substring(0,15),email:co.email,color:'var(--pu)'});
  });
  
  // Render "Send To" email chips
  const emlPicks=document.getElementById('crEmlPicks');
  if(emlPicks){
    emlPicks.innerHTML=toEmails.length?toEmails.map(e=>
      `<button class="btn btn-sm" style="padding:4px 10px;font-size:12px;min-height:32px;border:1px solid var(--bdr);background:var(--bg2);color:${e.color};border-radius:20px" onclick="document.getElementById('crEml').value='${E(e.email)}';toast('Set: ${E(e.email)}','success')" title="${E(e.label)}">${E(e.label)}: ${E(e.email)}</button>`
    ).join(''):'<span style="font-size:var(--fs-xs);color:var(--t3)">Select a customer to see available emails</span>';
  }
  
  // Render CC email chips
  const ccPicks=document.getElementById('crCCPicks');
  if(ccPicks){
    ccPicks.innerHTML=ccEmails.map(e=>
      `<button class="btn btn-sm" style="padding:4px 10px;font-size:12px;min-height:32px;border:1px solid var(--bdr);background:var(--bg2);color:${e.color};border-radius:20px" onclick="addCCEmail('${E(e.email)}')" title="${E(e.label)}">+ ${E(e.label)}: ${E(e.email)}</button>`
    ).join('');
  }
}

function addCCEmail(email){

function addCrPhotos(files){if(!files)return;Array.from(files).forEach(f=>{if(crPhotos.length>=10)return;const r=new FileReader();r.onload=e=>{compImg(e.target.result,800,.7,d=>{crPhotos.push({dataUrl:d,caption:'Photo '+(crPhotos.length+1),timestamp:new Date().toLocaleString()});updCrPhGrid();});};r.readAsDataURL(f);});}
function compImg(src,maxW,q,cb){const img=new Image();img.onload=function(){const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW;}c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q));};img.src=src;}
function updCrPhGrid(){const g=document.getElementById('crPhGrid');if(!crPhotos.length){g.innerHTML='<span style="color:var(--t3);font-size:var(--fs-sm)">No photos yet.</span>';return;}g.innerHTML=crPhotos.map((p,i)=>`<div class="photo-thumb"><img src="${p.dataUrl}" onclick="openLBx(crPhotos,${i})"><button class="photo-del" onclick="event.stopPropagation();crPhotos.splice(${i},1);updCrPhGrid()">✕</button></div>`).join('');}

function initSig(cid){const c=document.getElementById(cid);if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.lineCap='round';c._drawn=false;let d=false;function gp(e){const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy}}
c.addEventListener('mousedown',e=>{d=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y)});c.addEventListener('mousemove',e=>{if(!d)return;const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();c._drawn=true});c.addEventListener('mouseup',()=>d=false);c.addEventListener('mouseleave',()=>d=false);
c.addEventListener('touchstart',e=>{e.preventDefault();d=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y)},{passive:false});c.addEventListener('touchmove',e=>{e.preventDefault();if(!d)return;const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();c._drawn=true},{passive:false});c.addEventListener('touchend',()=>d=false);}
function clrSig(cid){const c=document.getElementById(cid);if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);c._drawn=false;}

function saveCR(){
  const d=getCRData();
  if(!d.jobNo){toast('Job No. required.','error');return;}
  d.id=DB.nR++;d.scannedAt=new Date().toISOString();d._modifiedAt=Date.now();
  DB.reports.push(d);
  let c=DB.custs.find(x=>x.name===d.customer);
  if(!c&&d.customer){const nc={id:DB.nC++,name:d.customer,address:'',contact:d.contact,phone:d.contactNum,email:'',agent:'',_modifiedAt:Date.now()};DB.custs.push(nc);markTouched('custs');}
  markTouched('reports');
  saveDB();
  clearFormDraft('cr_new');
  endFormDraft();
  flushPendingSync();
  toast('Report saved! Syncing to cloud…','success');
  showPage('reports');
}

async function saveAndEmailCR(){
  const d=getCRData();
  if(!d.jobNo){toast('Job No. required.','error');return;}
  const em=document.getElementById('crEml')?.value;
  if(!em){toast('Enter customer email.','error');return;}
  // Save report
  d.id=DB.nR++;d.scannedAt=new Date().toISOString();d._modifiedAt=Date.now();
  DB.reports.push(d);
  let c=DB.custs.find(x=>x.name===d.customer);
  if(!c&&d.customer){DB.custs.push({id:DB.nC++,name:d.customer,address:'',contact:d.contact,phone:d.contactNum,email:em,agent:'',_modifiedAt:Date.now()});markTouched('custs');}
  else if(c&&em){c.email=em;c._modifiedAt=Date.now();markTouched('custs');}
  markTouched('reports');
  saveDB();
  clearFormDraft('cr_new');endFormDraft();flushPendingSync();
  toast('Report saved! Syncing to cloud…','success');
  // Generate PDF and email
  const result=await generateReportPDF(d,false);
  const co=CO[d.company]||CO.octopack;
  const cc=document.getElementById('crCC')?.value||'';
  const subj=`Service Report ${d.jobNo} — ${d.type} — ${co.name}`;
  const body=`Dear ${d.contact||'Customer'},\n\nPlease find attached the signed service report.\n\nJob No.: ${d.jobNo}\nDate: ${d.date}\nEquipment: ${d.model} (S/N: ${d.serial})\nType: ${d.type}\nStatus: ${d.status}\n\nRegards,\n${d.engineer||''}\n${co.name}`;
  // Try native share (mobile can attach PDF directly)
  if(result&&navigator.share&&navigator.canShare){
    try{
      const file=new File([result.blob],result.fileName,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){await navigator.share({title:subj,files:[file]});toast('Shared!','success');showPage('reports');return;}
    }catch(e){if(e.name!=='AbortError')console.warn(e);}
  }
  // Fallback: download PDF + open email
  if(result)result.pdf.save(result.fileName);
  window.open(`mailto:${em}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body+(result?'\n\n📎 Attach the downloaded PDF: '+result.fileName:''))}`);
  showPage('reports');
}

function getAllMachinesDB(){
  const blocked=new Set(DB.deletedMachines||[]);
  const m={};
  (DB.machines||[]).forEach(mc=>{if(!blocked.has(mc.serial))m[mc.serial]={...mc,reports:[],lastService:'',issues:[]};});
  DB.reports.forEach(r=>{if(!r.serial||blocked.has(r.serial))return;if(!m[r.serial])m[r.serial]={serial:r.serial,model:r.model,customer:r.customer,location:'',installDate:'',warranty:'',purchaseRental:'',serviceContract:'',maintFrequency:'',category:'',reports:[],lastService:'',issues:[]};m[r.serial].reports.push(r);if(!m[r.serial].lastService||r.date>m[r.serial].lastService)m[r.serial].lastService=r.date;if(r.status!=='Completed')m[r.serial].issues.push(r);});
  return Object.values(m);
}

function filterMachines(){
  const s=(document.getElementById('mSrch')?.value||'').toLowerCase();

  let ms=getAllMachinesDB().filter(m=>(curMachCat==='all'||(m.category||'Uncategorized')===curMachCat)&&(m.serial+m.model+m.customer+(m.location||'')+(m.category||'')).toLowerCase().includes(s));

function onHasScaleChange(){

function getMachineCategories(){
  const defaults=['Stretch Wrapping Machines','Strapping Machines','Strapping Tools','Paper Machines','Air Bag Machines','Pallet Turners','Sealing Machines','Conveyor Systems','Other'];
  const fromDB=new Set(defaults);
  (DB.machines||[]).forEach(m=>{if(m.category)fromDB.add(m.category);});
  return[...fromDB].sort();
}

function onMachCustChange(){
  const custName=document.getElementById('mCu').value;
  const loField=document.getElementById('mLo');
  if(!custName){loField.value='';return;}
  // Always fill from customer data when customer changes
  const cust=DB.custs.find(c=>c.name===custName)||getAllCusts().find(c=>c.name===custName);
  if(cust?.address){loField.value=cust.address;return;}
  // Try location from existing machines for this customer
  const existingMachine=(DB.machines||[]).find(m=>m.customer===custName&&m.location);
  if(existingMachine){loField.value=existingMachine.location;return;}
  loField.value='';
}

function editMachine(serial){
  const m=(DB.machines||[]).find(x=>x.serial===serial);
  if(m)openMachineModal(m);
  else openMachineModal({serial});
}

function saveMachine(){
  const origSerial=document.getElementById('eMSerial')?.value||'';
  const catSel=document.getElementById('mCat').value;
  const catCustom=document.getElementById('mCatCustom')?.value.trim()||'';
  const category=(catSel==='__other__'&&catCustom)?catCustom:(catSel||'');
  const pmFreq=document.getElementById('mPMFreq').value;
  const pmLastDate=document.getElementById('mPMLastDate').value;
  let pmNextDate=document.getElementById('mPMNextDate').value;
  
  // Auto-calculate next PM date
  if(pmFreq){
    if(pmLastDate&&!pmNextDate){
      pmNextDate=calcNextPMDate(pmLastDate,pmFreq);
    }else if(!pmLastDate&&!pmNextDate){
      const startDate=document.getElementById('mDt').value||new Date().toISOString().split('T')[0];
      pmNextDate=calcNextPMDate(startDate,pmFreq);
    }
  }else{
    pmNextDate='';
  }
  
  // Calibration fields (weighing scale)
  const hasScale=!!document.getElementById('mHasScale')?.checked;
  let calFreq='',calLastDate='',calNextDate='',calCertNo='',calBy='',calCapacity='',calTolerance='';
  if(hasScale){
    calFreq=document.getElementById('mCalFreq').value;
    calLastDate=document.getElementById('mCalLastDate').value;
    calNextDate=document.getElementById('mCalNextDate').value;
    calCertNo=document.getElementById('mCalCertNo').value.trim();
    calBy=document.getElementById('mCalBy').value.trim();
    calCapacity=document.getElementById('mCalCapacity').value.trim();
    calTolerance=document.getElementById('mCalTolerance').value.trim();
    if(calFreq){
      if(calLastDate&&!calNextDate){
        calNextDate=calcNextPMDate(calLastDate,calFreq);
      }else if(!calLastDate&&!calNextDate){
        const startDate=document.getElementById('mDt').value||new Date().toISOString().split('T')[0];
        calNextDate=calcNextPMDate(startDate,calFreq);
      }
    }else{
      calNextDate='';
    }
  }
  
  const d={
    serial:document.getElementById('mSr').value.trim(),
    model:document.getElementById('mMd').value.trim(),
    customer:document.getElementById('mCu').value,
    location:document.getElementById('mLo').value.trim(),
    installDate:document.getElementById('mDt').value,
    warranty:document.getElementById('mWr').value.trim(),
    purchaseRental:document.getElementById('mPR').value,
    serviceContract:document.getElementById('mSC').value.trim(),
    category:category,
    pmFreq:pmFreq,
    pmLastDate:pmLastDate,
    pmNextDate:pmNextDate,
    maintFrequency:pmFreq?({monthly:'12',bimonthly:'6',quarterly:'4',triannual:'3',biannual:'2',annual:'1'}[pmFreq]||''):'',
    hasScale:hasScale,
    calFreq:calFreq,
    calLastDate:calLastDate,
    calNextDate:calNextDate,
    calCertNo:calCertNo,
    calBy:calBy,
    calCapacity:calCapacity,
    calTolerance:calTolerance
  };
  if(!d.serial){toast('Serial number required.','error');return;}
  if(!d.model){toast('Model required.','error');return;}
  
  d._modifiedAt=Date.now();
  if(!Array.isArray(DB.machines))DB.machines=[];
  
  if(origSerial){
    // Editing existing
    const i=DB.machines.findIndex(m=>m.serial===origSerial);
    if(i>=0){
      // If customer changed, update the link
      const oldCust=DB.machines[i].customer;
      DB.machines[i]={...DB.machines[i],...d};
    }else{
      d.id=DB.nM++;DB.machines.push(d);
    }
  }else{
    // Check duplicate serial
    if(DB.machines.find(m=>m.serial===d.serial)){toast('Serial already exists.','error');return;}
    d.id=DB.nM++;DB.machines.push(d);
  }
  markTouched('machines');saveDB();closeModal();renderMachines();flushPendingSync();toast('Machine saved.','success');
}

function delMachine(serial){
  if(getAllMachinesDB().length<=1){toast('Cannot delete the last machine.','error');return;}
  const rptCount=DB.reports.filter(r=>r.serial===serial).length;
  if(!confirm(`Delete machine "${serial}"?${rptCount?'\n\n⚠ '+rptCount+' report(s) reference this machine. Reports will be kept for records.':''}`))return;
  const m=(DB.machines||[]).find(x=>x.serial===serial);
  if(m&&m.id!=null)tombstoneDelete('machines',m.id);
  DB.machines=(DB.machines||[]).filter(m=>m.serial!==serial);
  if(!Array.isArray(DB.deletedMachines))DB.deletedMachines=[];
  if(!DB.deletedMachines.includes(serial))DB.deletedMachines.push(serial);
  saveDB();renderMachines();renderDash();flushPendingSync();toast('Machine deleted.','info');
}

function saveWarehouse(){
  const eid=parseInt(document.getElementById('wEid').value)||null;
  const d={
    name:document.getElementById('wNm').value.trim(),
    address:document.getElementById('wAd').value.trim(),
    contact:document.getElementById('wCt').value.trim(),
    phone:document.getElementById('wPh').value.trim(),
    email:document.getElementById('wEm').value.trim(),
    notes:document.getElementById('wNt').value.trim(),
    _modifiedAt:Date.now()
  };
  if(!d.name){toast('Warehouse name required','error');return;}
  if(!Array.isArray(DB.warehouses))DB.warehouses=[];
  if(eid){
    const i=DB.warehouses.findIndex(x=>x.id===eid);
    if(i>=0)DB.warehouses[i]={...DB.warehouses[i],...d};
  }else{
    d.id=DB.nW++;DB.warehouses.push(d);

function delWarehouse(id){
  const w=(DB.warehouses||[]).find(x=>x.id===id);
  if(!w)return;
  const stockHere=(DB.inventory||[]).filter(i=>i.warehouseId===id);
  if(!confirm(`Delete warehouse "${w.name}"?${stockHere.length?'\n\n⚠ '+stockHere.length+' inventory item(s) at this warehouse will also be removed.':''}`))return;
  // Tombstone the warehouse + linked stock
  tombstoneDelete('warehouses',id);
  stockHere.forEach(it=>{if(it.id!=null)tombstoneDelete('inventory',it.id);});
  DB.warehouses=DB.warehouses.filter(x=>x.id!==id);
  DB.inventory=(DB.inventory||[]).filter(i=>i.warehouseId!==id);
  saveDB();renderInventory();flushPendingSync();toast('Warehouse removed','info');
}

function saveInventory(){
  const eid=parseInt(document.getElementById('iEid').value)||null;
  const d={
    warehouseId:parseInt(document.getElementById('iWh').value),
    model:document.getElementById('iMd').value.trim(),
    category:document.getElementById('iCt').value.trim(),
    quantity:parseInt(document.getElementById('iQt').value)||0,
    minStock:document.getElementById('iMn').value.trim()?parseInt(document.getElementById('iMn').value):null,
    notes:document.getElementById('iNt').value.trim(),
    _modifiedAt:Date.now()
  };
  if(!d.model){toast('Model is required','error');return;}
  if(!d.warehouseId){toast('Pick a warehouse','error');return;}
  if(d.quantity<0){toast('Quantity cannot be negative','error');return;}
  if(!Array.isArray(DB.inventory))DB.inventory=[];
  if(eid){
    // Editing existing entry — straight update
    const i=DB.inventory.findIndex(x=>x.id===eid);
    if(i>=0)DB.inventory[i]={...DB.inventory[i],...d};
    markTouched('inventory');saveDB();closeModal();renderInventory();flushPendingSync();toast('Stock updated','success');
    return;
  }
  // New entry — but if same model+warehouse exists already, merge quantities to avoid duplicates
  const existing=DB.inventory.find(x=>x.warehouseId===d.warehouseId&&x.model.toLowerCase()===d.model.toLowerCase());
  if(existing){
    existing.quantity=(parseInt(existing.quantity)||0)+d.quantity;
    if(d.notes)existing.notes=(existing.notes?existing.notes+'\n':'')+d.notes;
    if(d.minStock)existing.minStock=d.minStock;
    if(d.category)existing.category=d.category;
    existing._modifiedAt=Date.now();
    markTouched('inventory');saveDB();closeModal();renderInventory();flushPendingSync();
    toast(`Added ${d.quantity} unit(s) to existing stock (now ${existing.quantity})`,'success');
    return;
  }
  d.id=DB.nI++;
  DB.inventory.push(d);
  markTouched('inventory');saveDB();closeModal();renderInventory();flushPendingSync();
  toast(`${d.quantity} ${d.model} added to inventory`,'success');
}

function delInventory(id){
  const it=(DB.inventory||[]).find(x=>x.id===id);
  if(!it)return;
  if(!confirm(`Remove ${it.quantity} unit(s) of "${it.model}" from inventory?`))return;
  tombstoneDelete('inventory',id);
  DB.inventory=DB.inventory.filter(x=>x.id!==id);
  saveDB();renderInventory();flushPendingSync();toast('Stock entry removed','info');
}

    <p style="font-size:var(--fs-sm);color:var(--t2);margin-bottom:14px">Move 1 unit from <strong>${E(wh?wh.name:'warehouse')}</strong> to a customer. The unit becomes a tracked machine.</p>
    <input type="hidden" id="dpItemId" value="${it.id}">

      <input class="fc" id="dpCuCustom" placeholder="Or type new customer name..." style="margin-top:6px">
    </div>
    <div class="fg"><label>Serial Number *</label><input class="fc" id="dpSr" placeholder="Unique serial number for this unit"></div>
    <div class="fg"><label>Location at Customer</label><input class="fc" id="dpLo" placeholder="e.g. Production Line 1"></div>

    <div class="fg"><label>Warranty</label><input class="fc" id="dpWr" placeholder="e.g. 12 months"></div>
    <div class="fg"><label>Quantity to Deploy</label><input class="fc" type="number" id="dpQty" value="1" min="1" max="${it.quantity}"></div>
    <p style="font-size:11px;color:var(--t3)">💡 If you deploy more than 1 unit, you'll be asked for serials for each.</p>
  `,`<button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="confirmDeploy()">Deploy</button>`);
}

function confirmDeploy(){
  const itemId=parseInt(document.getElementById('dpItemId').value);
  const it=(DB.inventory||[]).find(x=>x.id===itemId);
  if(!it){toast('Stock entry not found','error');return;}
  const customer=document.getElementById('dpCu').value||document.getElementById('dpCuCustom').value.trim();
  const baseSerial=document.getElementById('dpSr').value.trim();
  const location=document.getElementById('dpLo').value.trim();
  const installDate=document.getElementById('dpDt').value;
  const warranty=document.getElementById('dpWr').value.trim();
  const qty=parseInt(document.getElementById('dpQty').value)||1;
  if(!customer){toast('Pick or enter a customer','error');return;}
  if(!baseSerial){toast('Serial number required','error');return;}
  if(qty>parseInt(it.quantity)){toast(`Only ${it.quantity} unit(s) in stock`,'error');return;}
  let serials=[baseSerial];
  if(qty>1){
    // Ask user for the additional serials inline
    serials=[];
    for(let i=0;i<qty;i++){
      const sn=prompt(`Serial for unit ${i+1} of ${qty}`+(i===0?` (you entered "${baseSerial}"):`:':'),i===0?baseSerial:'');
      if(!sn||!sn.trim()){toast('Cancelled','info');return;}
      serials.push(sn.trim());
    }
  }
  // Check no duplicate serials in DB.machines
  const existingSerials=new Set((DB.machines||[]).map(m=>m.serial));
  for(const sn of serials){if(existingSerials.has(sn)){toast(`Serial "${sn}" already exists. Aborted.`,'error');return;}}
  // Ensure customer exists in DB.custs (auto-create)
  if(!DB.custs.find(c=>c.name===customer)){DB.custs.push({id:DB.nC++,name:customer,address:'',contact:'',phone:'',email:'',agent:'',_modifiedAt:Date.now()});markTouched('custs');}
  // Create machine records
  const now=Date.now();
  if(!Array.isArray(DB.machines))DB.machines=[];
  serials.forEach(sn=>{
    DB.machines.push({
      id:DB.nM++,
      serial:sn,
      model:it.model,
      customer:customer,
      location:location,
      installDate:installDate,
      warranty:warranty,
      category:it.category||'',
      _modifiedAt:now,
      _deployedFromInventory:itemId
    });
  });
  // Decrement inventory
  it.quantity=Math.max(0,parseInt(it.quantity)-qty);
  it._modifiedAt=now;
  // If hits 0, leave the row (user can delete or restock); easier than auto-removing
  markTouched('inventory');markTouched('machines');saveDB();closeModal();renderInventory();flushPendingSync();
  toast(`Deployed ${qty} unit(s) of ${it.model} to ${customer}`,'success');
}

function calcNextPMDate(lastDate,freq){
  if(!lastDate||!freq)return'';
  const d=new Date(lastDate);
  const months={monthly:1,bimonthly:2,quarterly:3,triannual:4,biannual:6,annual:12}[freq]||0;
  if(!months)return'';
  d.setMonth(d.getMonth()+months);
  return d.toISOString().split('T')[0];
}

function onPMFreqChange(){
  const freq=document.getElementById('mPMFreq').value;
  const lastDate=document.getElementById('mPMLastDate').value;
  const nextEl=document.getElementById('mPMNextDate');
  if(!freq){nextEl.value='';return;}
  const startDate=lastDate||document.getElementById('mDt').value||new Date().toISOString().split('T')[0];
  nextEl.value=calcNextPMDate(startDate,freq);
}

function generatePMJobs(horizonDays){
  // horizonDays = how many days into the future to include. Default 30 days so users
  // get lead time to arrange the work, instead of waiting until the PM is overdue.
  if(horizonDays==null)horizonDays=30;
  const today=new Date().toISOString().split('T')[0];
  const cutoff=new Date(today);cutoff.setDate(cutoff.getDate()+horizonDays);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  
  // Auto-fix machines with frequency but no next date
  (DB.machines||[]).forEach(m=>{
    if(m.pmFreq&&!m.pmNextDate){
      m.pmNextDate=calcNextPMDate(m.pmLastDate||m.installDate||today,m.pmFreq);
    }
  });
  
  const machines=(DB.machines||[]).filter(m=>m.pmFreq&&m.pmNextDate&&m.pmNextDate<=cutoffStr);
  if(!machines.length){toast(`No PM jobs due within ${horizonDays} days.`,'info');return;}
  
  let created=0,skipped=0;
  machines.forEach(m=>{
    // Check if a PM job already exists for this machine (any date, not completed)
    const existing=DB.jobs.find(j=>{
      const jSerials=(j.machines||[]).map(x=>x.serial);
      return(j.machine===m.serial||jSerials.includes(m.serial))&&j.type==='Preventive Maintenance'&&j.status!=='Completed';
    });
    if(existing){skipped++;return;}
    
    const isOverdue=m.pmNextDate<=today;
    const job={
      id:DB.nJ++,
      title:'PM Service — '+m.customer+' — '+m.model,
      customer:m.customer,
      machines:[{model:m.model,serial:m.serial}],
      machine:m.serial,
      model:m.model,
      techIds:[],techId:null,
      type:'Preventive Maintenance',
      priority:isOverdue?'High':'Medium',
      date:m.pmNextDate,
      time:'',
      desc:'Scheduled Preventive Maintenance'+(isOverdue?' (OVERDUE)':'')+'\n\nMachine: '+m.model+' (S/N: '+m.serial+')\nCustomer: '+(m.customer||'')+'\nLocation: '+(m.location||'')+'\nCategory: '+(m.category||'')+'\nContract: '+(m.serviceContract||'')+'\nPM Frequency: '+({monthly:'Monthly',bimonthly:'Every 2 Months',quarterly:'Quarterly',triannual:'3× a year (4 months)',biannual:'Every 6 Months',annual:'Annual'}[m.pmFreq]||m.pmFreq)+'\nDue Date: '+m.pmNextDate,
      status:'Open',
      createdAt:new Date().toISOString(),
      _modifiedAt:Date.now(),
      waSent:false
    };
    DB.jobs.push(job);
    
    // Advance next PM date so we don't generate again next round
    m.pmLastDate=m.pmNextDate;
    m.pmNextDate=calcNextPMDate(m.pmNextDate,m.pmFreq);
    m._modifiedAt=Date.now();
    created++;
  });
  
  markTouched('jobs');markTouched('machines');
  saveDB();flushPendingSync();
  // Refresh all relevant pages
  try{renderDash();}catch(e){}
  try{renderJobs();}catch(e){}
  try{renderMachines();}catch(e){}
  
  let msg=`Generated ${created} PM job(s).`;
  if(skipped)msg+=` ${skipped} skipped (existing open PM jobs).`;
  msg+=' Assign technicians on the Job Board.';
  toast(msg,'success');
}

// Generate calibration jobs for weighing-scale machines that are overdue or due within the horizon
function generateCalJobs(horizonDays){
  if(horizonDays==null)horizonDays=30;
  const today=new Date().toISOString().split('T')[0];
  const cutoff=new Date(today);cutoff.setDate(cutoff.getDate()+horizonDays);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  
  // Auto-fix scale machines without a next-cal date
  (DB.machines||[]).forEach(m=>{
    if(m.hasScale&&m.calFreq&&!m.calNextDate){
      m.calNextDate=calcNextPMDate(m.calLastDate||m.installDate||today,m.calFreq);
    }
  });
  
  const machines=(DB.machines||[]).filter(m=>m.hasScale&&m.calFreq&&m.calNextDate&&m.calNextDate<=cutoffStr);
  if(!machines.length){toast(`No calibration jobs due within ${horizonDays} days.`,'info');return;}
  
  let created=0,skipped=0;
  machines.forEach(m=>{
    // Check if a calibration job already exists for this machine (any date, not completed)
    const existing=DB.jobs.find(j=>{
      const jSerials=(j.machines||[]).map(x=>x.serial);
      return(j.machine===m.serial||jSerials.includes(m.serial))&&(j.type==='Calibration'||(j.title||'').toLowerCase().includes('calibration'))&&j.status!=='Completed';

    if(existing){skipped++;return;}
    
    const isOverdue=m.calNextDate<=today;
    const job={

      title:'Calibration — '+m.customer+' — '+m.model+(m.calCapacity?' ('+m.calCapacity+')':''),
      customer:m.customer,
      machines:[{model:m.model,serial:m.serial}],
      machine:m.serial,
      model:m.model,
      techIds:[],techId:null,
      type:'Calibration',
      priority:isOverdue?'High':'Medium',
      date:m.calNextDate,
      time:'',
      desc:'Weighing Scale Calibration'+(isOverdue?' (OVERDUE)':'')+'\n\nMachine: '+m.model+' (S/N: '+m.serial+')\nCustomer: '+(m.customer||'')+'\nLocation: '+(m.location||'')+(m.calCapacity?'\nScale Capacity: '+m.calCapacity:'')+(m.calTolerance?'\nTolerance: '+m.calTolerance:'')+(m.calCertNo?'\nLast Cert No.: '+m.calCertNo:'')+(m.calBy?'\nUsual Calibration By: '+m.calBy:'')+'\nCal Frequency: '+({monthly:'Monthly',quarterly:'Quarterly',triannual:'3× a year (4 months)',biannual:'Every 6 Months',annual:'Annual'}[m.calFreq]||m.calFreq)+'\nDue Date: '+m.calNextDate,
      status:'Open',
      createdAt:new Date().toISOString(),
      _modifiedAt:Date.now(),
      waSent:false
    };
    DB.jobs.push(job);
    
    // Advance next cal date so we don't keep generating
    m.calLastDate=m.calNextDate;
    m.calNextDate=calcNextPMDate(m.calNextDate,m.calFreq);
    m._modifiedAt=Date.now();
    created++;
  });
  
  markTouched('jobs');markTouched('machines');
  saveDB();flushPendingSync();
  try{renderDash();}catch(e){}
  try{renderJobs();}catch(e){}
  try{renderMachines();}catch(e){}
  
  let msg=`Generated ${created} calibration job(s).`;
  if(skipped)msg+=` ${skipped} skipped (existing open calibration jobs).`;
  msg+=' Assign technicians on the Job Board.';
  toast(msg,'success');
}

function delCust(nameOrEl){
  const name=typeof nameOrEl==='string'?nameOrEl:nameOrEl;
  if(!name)return;
  if(getAllCusts().length<=1){toast('Cannot delete the last customer.','error');return;}
  const machCount=(DB.machines||[]).filter(m=>m.customer===name).length;
  const rptCount=DB.reports.filter(r=>r.customer===name).length;
  
  let msg=`Delete customer "${name}"?`;
  if(machCount)msg+=`\n\n⚠ ${machCount} machine(s) linked.`;
  if(rptCount)msg+=`\n⚠ ${rptCount} report(s) reference this customer.`;
  if(machCount||rptCount)msg+=`\n\nThe customer and all linked machines will be removed. Reports will be kept for records.`;
  
  if(!confirm(msg))return;
  
  // Tombstone the customer + linked machines so they don't resurrect from cloud snapshots
  const cust=DB.custs.find(c=>c.name===name);
  if(cust&&cust.id!=null)tombstoneDelete('custs',cust.id);
  if(DB.machines)DB.machines.filter(m=>m.customer===name).forEach(m=>{if(m.id!=null)tombstoneDelete('machines',m.id);});
  
  // Remove from DB.custs
  DB.custs=DB.custs.filter(c=>c.name!==name);
  
  // Remove linked machines
  if(DB.machines)DB.machines=DB.machines.filter(m=>m.customer!==name);
  
  // Add to blocklist so getAllCusts doesn't recreate from reports
  if(!Array.isArray(DB.deletedCusts))DB.deletedCusts=[];
  if(!DB.deletedCusts.includes(name))DB.deletedCusts.push(name);
  
  saveDB();renderCusts();renderDash();flushPendingSync();
  toast(`"${name}" deleted${machCount?' + '+machCount+' machine(s)':''}.`,'info');
}

function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(){if(calY===undefined){const n=new Date();calY=n.getFullYear();calM=n.getMonth();}const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];const fd=new Date(calY,calM,1).getDay(),dm=new Date(calY,calM+1,0).getDate(),td=new Date();const ev={};function ae(dt,d){if(!dt)return;if(!ev[dt])ev[dt]=[];ev[dt].push(d);}DB.reports.forEach(r=>{ae(r.date,{type:'report',l:r.customer?.substring(0,16),bg:'var(--oks)',c:'var(--ok)',data:r});ae(r.nextVisit,{type:'visit',l:'🔔 '+r.customer?.substring(0,12),bg:'var(--wns)',c:'var(--wn)',data:r});});DB.jobs.forEach(j=>{if(j.status!=='Completed')ae(j.date,{type:'job',l:'🔧 '+j.title?.substring(0,14),bg:'var(--acs)',c:'var(--ac)',data:j});});const sharedEv=getSharedEvents();sharedEv.forEach(s=>{ae(s.date,{type:'shared',l:'🔗 '+(s.title||'').substring(0,14),bg:'var(--pus)',c:'var(--pu)',data:s});});

['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{h+=`<div class="ch-h">${d}</div>`;});const pd=new Date(calY,calM,0).getDate();for(let i=fd-1;i>=0;i--)h+=`<div class="cd om"><div class="dn">${pd-i}</div></div>`;for(let d=1;d<=dm;d++){const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const it=td.getFullYear()===calY&&td.getMonth()===calM&&td.getDate()===d;const de=ev[ds]||[];h+=`<div class="cd ${it?'today':''}" ${de.length?`onclick="showCalDay('${ds}')" style="cursor:pointer"`:''} ><div class="dn">${d}</div>${de.slice(0,2).map(e=>`<div class="ce" style="background:${e.bg};color:${e.c}" title="${E(e.type==='shared'?'['+(e.data&&e.data.sourceLabel||'Other')+'] '+e.l:e.l)}">${E(e.l)}</div>`).join('')}${de.length>2?`<div style="font-size:9px;color:var(--t3)">+${de.length-2} more</div>`:''}</div>`;}const tt=fd+dm;for(let i=1;i<=(7-(tt%7))%7;i++)h+=`<div class="cd om"><div class="dn">${i}</div></div>`;h+='</div>';document.getElementById('calendarContent').innerHTML=h;}

// ===== AI HELPERS =====
function safeParseJSON(text){
  try{return JSON.parse(text);}catch(e1){}
  let fixed=text;
  let braces=0,brackets=0,inStr=false,lastChar='';
  for(let i=0;i<fixed.length;i++){
    const c=fixed[i];
    if(c==='"'&&lastChar!=='\\')inStr=!inStr;
    if(!inStr){if(c==='{')braces++;if(c==='}')braces--;if(c==='[')brackets++;if(c===']')brackets--;}
    lastChar=c;
  }
  if(inStr)fixed+='"';
  fixed=fixed.replace(/,\s*"[^"]*"?\s*:?\s*"?[^"]*$/,'');
  while(brackets>0){fixed+=']';brackets--;}
  while(braces>0){fixed+='}';braces--;}
  fixed=fixed.replace(/,\s*([}\]])/g,'$1');
  try{return JSON.parse(fixed);}catch(e2){}
  return null;
}

let scanBase64=null,scanCanvas=null,scanOrigData=null,scanIsPDF=false,scanMediaType='image/jpeg';

function procScan(f){
  if(!f)return;
  scanIsPDF=f.type==='application/pdf';
  
  const reader=new FileReader();
  reader.onload=function(e){
    scanBase64=e.target.result;
    
    if(scanIsPDF){
      // Show PDF info (can't preview PDF on canvas)
      scanMediaType='application/pdf';
      document.getElementById('scPreviewImg').src='';
      document.getElementById('scPreviewImg').alt='PDF uploaded: '+f.name;
      document.getElementById('scPreviewImg').style.display='none';
      document.getElementById('scPrev').style.display='block';
      document.getElementById('scPrev').querySelector('.scan-enhance').style.display='none';
      // Show a PDF indicator instead of image
      const prevDiv=document.getElementById('scPrev');
      prevDiv.insertAdjacentHTML('afterbegin',`<div id="pdfBanner" style="padding:24px;background:var(--ers);border-radius:var(--r);text-align:center;margin-bottom:12px"><div style="font-size:32px;margin-bottom:8px">📄</div><div style="font-size:var(--fs);font-weight:700">${E(f.name)}</div><div style="font-size:var(--fs-sm);color:var(--t2);margin-top:4px">${(f.size/1024).toFixed(0)} KB — PDF will be sent directly to AI</div></div>`);
      // Auto-send to AI for PDFs
      setTimeout(()=>sendToAI(),500);
    } else {
      // Image handling with enhancement
      scanMediaType=f.type.startsWith('image/png')?'image/png':'image/jpeg';
      document.getElementById('scPreviewImg').style.display='block';
      document.getElementById('scPreviewImg').src=scanBase64;
      document.getElementById('scPrev').style.display='block';
      document.getElementById('scPrev').querySelector('.scan-enhance').style.display='block';
      // Remove any PDF banner
      document.getElementById('pdfBanner')?.remove();
      
      const img=new Image();
      img.onload=function(){
        scanCanvas=document.createElement('canvas');
        let w=img.width,h=img.height;const maxW=1200;if(w>maxW){h=h*(maxW/w);w=maxW;}
        scanCanvas.width=w;scanCanvas.height=h;
        const ctx=scanCanvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        scanOrigData=ctx.getImageData(0,0,w,h);
        autoEnhance();
      };
      img.src=scanBase64;
    }
  };
  reader.readAsDataURL(f);
}

function applyEnhancePreview(){
  if(!scanOrigData||!scanCanvas)return;
  const b=parseInt(document.getElementById('scBright').value);
  const c=parseInt(document.getElementById('scContrast').value);
  document.getElementById('scBrVal').textContent=b;
  document.getElementById('scCoVal').textContent=c;
  const ctx=scanCanvas.getContext('2d');
  const imgData=new ImageData(new Uint8ClampedArray(scanOrigData.data),scanOrigData.width,scanOrigData.height);
  const d=imgData.data;const cf=(259*(c+255))/(255*(259-c));
  for(let i=0;i<d.length;i+=4){
    for(let ch=0;ch<3;ch++){d[i+ch]=Math.min(255,Math.max(0,cf*(d[i+ch]+b-128)+128));}
  }
  ctx.putImageData(imgData,0,0);
  document.getElementById('scPreviewImg').src=scanCanvas.toDataURL('image/jpeg',0.9);
}

function autoEnhance(){document.getElementById('scBright').value=20;document.getElementById('scContrast').value=40;applyEnhancePreview();}
function resetEnhance(){document.getElementById('scBright').value=0;document.getElementById('scContrast').value=0;applyEnhancePreview();}

async function sendToAI(){
  if(!PROXY_URL){
    toast('AI not configured. Open Data Import/Export → 🤖 AI Import to set Worker URL.','error');
    return;
  }

  const procEl=document.getElementById('scProc');
  const resEl=document.getElementById('scRes');
  procEl.style.display='block';resEl.style.display='none';
  document.getElementById('scProcMsg').textContent='🤖 Claude is reading your document...';

  // Get the image/PDF data
  let base64Data, mimeType;
  if(scanIsPDF){
    base64Data=scanBase64.split(',')[1];
    mimeType='application/pdf';
  } else {
    const imgSrc=scanCanvas?scanCanvas.toDataURL('image/jpeg',0.85):scanBase64;
    base64Data=imgSrc.split(',')[1];
    mimeType=imgSrc.startsWith('data:image/png')?'image/png':'image/jpeg';
  }

  // Compress oversized images
  const sizeMB=base64Data.length*0.75/1048576;
  if(!scanIsPDF&&sizeMB>4&&scanCanvas){
    document.getElementById('scProcMsg').textContent='📐 Compressing large image...';
    const smaller=scanCanvas.toDataURL('image/jpeg',0.6);
    base64Data=smaller.split(',')[1];
    mimeType='image/jpeg';
  }

  try{
    const resp=await fetch(PROXY_URL,{
      method:'POST',
      headers:Object.assign({'Content-Type':'application/json'},PROXY_SECRET?{'X-Shared-Secret':PROXY_SECRET}:{}),
      body:JSON.stringify({kind:'scan_report',mediaType:mimeType,data:base64Data})
    });
    const json=await resp.json().catch(()=>({}));
    if(!resp.ok||!json.ok)throw new Error(json.error||('HTTP '+resp.status));
    const parsed=json.data;
    document.getElementById('scProcMsg').textContent='✅ Extraction complete!';
    setTimeout(()=>{procEl.style.display='none';resEl.style.display='block';showScanForm(parsed);},500);
  }catch(err){
    console.error('Scan error:',err);
    document.getElementById('scProcMsg').textContent='❌ '+(err.message||'Scan failed')+'. Check Worker config.';
  }
}

function expICS(filter){
  const events=[];
  const now=new Date();
  const stamp=now.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  
  // Jobs
  if(filter==='all'||filter==='jobs'){
    DB.jobs.forEach(j=>{
      if(!j.date)return;
      const techNames=getJobTechNames(j);
      const cust=DB.custs.find(c=>c.name===j.customer);
      const d=j.date.replace(/-/g,'');
      const ev=['BEGIN:VEVENT',`UID:job-${j.id}@octocrm`,`DTSTAMP:${stamp}`];
      
      if(j.time){
        // Timed event
        const [hh,mm]=j.time.split(':');
        ev.push(`DTSTART:${d}T${hh}${mm}00`);
        ev.push(`DTEND:${d}T${String(parseInt(hh)+2).padStart(2,'0')}${mm}00`);
      }else{
        ev.push(`DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`);
      }
      
      ev.push(`SUMMARY:${icsEsc(j.title||'Job')}`);
      if(cust?.address)ev.push(`LOCATION:${icsEsc(cust.address)}`);
      
      let desc=`Type: ${j.type||''}\nCustomer: ${j.customer||''}\nTechnician(s): ${techNames}\nPriority: ${j.priority||''}\nStatus: ${j.status||''}`;
      if(j.machine)desc+=`\nMachine S/N: ${j.machine}`;
      if(cust?.phone)desc+=`\nContact: ${cust.contact||''} ${cust.phone}`;
      if(j.desc)desc+=`\n\nInstructions:\n${j.desc}`;
      ev.push(`DESCRIPTION:${icsEsc(desc)}`);
      
      // Color/category
      if(j.priority==='Urgent'||j.priority==='High')ev.push('PRIORITY:1');
      else if(j.priority==='Medium')ev.push('PRIORITY:5');
      else ev.push('PRIORITY:9');
      
      ev.push(`STATUS:${j.status==='Completed'?'COMPLETED':'CONFIRMED'}`);
      ev.push('END:VEVENT');
      events.push(ev.join('\r\n'));
    });
  }
  
  // Next visits from reports
  if(filter==='all'||filter==='visits'){
    DB.reports.forEach(r=>{
      if(!r.nextVisit)return;
      const d=r.nextVisit.replace(/-/g,'');
      const ev=['BEGIN:VEVENT',`UID:visit-${r.id}@octocrm`,`DTSTAMP:${stamp}`,
        `DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,
        `SUMMARY:${icsEsc('Follow-up: '+r.customer+' — '+r.model)}`,
        `DESCRIPTION:${icsEsc(`Follow-up visit for ${r.customer}\nMachine: ${r.model||''} (S/N: ${r.serial||''})\nPrevious job: ${r.jobNo||''} on ${r.date||''}\nEngineer: ${r.engineer||''}\nPrevious remarks: ${r.remarks||''}\nRecommendations: ${r.recommendations||''}`)}`,
        'PRIORITY:5','STATUS:NEEDS-ACTION','END:VEVENT'];
      events.push(ev.join('\r\n'));
    });
  }
  
  if(!events.length){toast('No events to export.','info');return;}
  
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//OctoCRM//Field Service v4//EN',
    'X-WR-CALNAME:OctoCRM — Technical Department','METHOD:PUBLISH','CALSCALE:GREGORIAN',
    ...events,'END:VCALENDAR'].join('\r\n');
  
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`OctoCRM_Calendar_${filter}_${new Date().toISOString().split('T')[0]}.ics`;
  a.click();URL.revokeObjectURL(a.href);
  toast(`Exported ${events.length} event(s).`,'success');
}

function icsEsc(s){
  if(!s)return'';
  return String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

function savePO(){
  // Prevent double-click
  const saveBtn=document.querySelector('.mf .btn-p');
  if(saveBtn){if(saveBtn.dataset.saving==='1')return;saveBtn.dataset.saving='1';saveBtn.textContent='Saving...';}
  const eidEl=document.getElementById('ePOId');const eid=eidEl?eidEl.value:'';
  const items=[];
  document.querySelectorAll('#poItems [data-pi]').forEach(row=>{
    const desc=row.querySelector('.piDesc')?.value.trim()||'';
    const qty=row.querySelector('.piQty')?.value.trim()||'';
    const unit=row.querySelector('.piUnit')?.value.trim()||'';
    const amount=row.querySelector('.piAmt')?.value||'';
    if(desc||qty||amount)items.push({desc,qty,unit,amount:parseFloat(amount)||0});
  });
  const d={poNo:document.getElementById('pPoNo').value.trim(),date:document.getElementById('pDt').value,customer:document.getElementById('pCu').value,description:document.getElementById('pDs').value.trim(),items:items,status:document.getElementById('pSt').value,_modifiedAt:Date.now()};
  if(!d.poNo){toast('PO number required.','error');if(saveBtn)saveBtn.dataset.saving='';saveBtn.textContent='Save';return;}
  if(!Array.isArray(DB.pos))DB.pos=[];
  if(!DB.nP||isNaN(DB.nP))DB.nP=Math.max(0,...DB.pos.map(p=>p.id||0))+1;
  if(eid&&eid!==''){const i=DB.pos.findIndex(p=>p.id===parseInt(eid));if(i>=0)DB.pos[i]={...DB.pos[i],...d};}
  else{
    d.id=DB.nP++;d.createdAt=new Date().toISOString();DB.pos.push(d);
    // Auto-create a job from this new PO
    const itemDescs=(items||[]).map(i=>i.desc).filter(Boolean).join(', ');
    const newJob={
      id:DB.nJ++,
      title:'PO: '+(d.poNo||'')+(d.customer?' — '+d.customer:''),
      customer:d.customer||'',
      machine:'',model:'',
      techIds:[],techId:null,
      type:'Preventive Maintenance',
      priority:'Medium',
      date:d.date||'',time:'',
      desc:'PO No.: '+d.poNo+'\n'+(d.description||'')+'\n\nItems:\n'+((items||[]).map((it,i)=>(i+1)+'. '+it.desc+(it.qty?' x'+it.qty:'')+(it.amount?' — $'+it.amount.toFixed(2):'')).join('\n')||'N/A'),
      status:'Open',
      poNo:d.poNo,
      poId:d.id,
      createdAt:new Date().toISOString(),
      waSent:false,
      _modifiedAt:Date.now()
    };
    DB.jobs.push(newJob);
    markTouched('jobs');
    toast('Job auto-created from PO.','info');
  }
  markTouched('pos');saveDB();flushPendingSync();closeModal();renderPOs();toast('PO saved.','success');
}

  openModal('📸 Scan Purchase Order',`
    <p style="color:var(--t2);margin-bottom:12px">Upload a photo or PDF of a Purchase Order. Claude will extract all details.</p>

  `,`<button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="processPOScan()">🤖 Scan with AI</button>`);

async function processPOScan(){
  const file=document.getElementById('poScanFile')?.files[0];
  if(!file){toast('Select a file.','error');return;}
  const statusEl=document.getElementById('poScanStatus');
  statusEl.style.display='block';statusEl.innerHTML='<strong>🤖 Reading PO with Claude...</strong>';
  try{
    const parsed=await aiCall('po',file);
    if(!parsed){statusEl.innerHTML='<strong style="color:var(--er)">❌ Scan failed. See toast for details.</strong>';return;}
    statusEl.innerHTML='<strong style="color:var(--ok)">✅ PO extracted successfully!</strong>';
    const scannedData={poNo:parsed.poNo||'',date:parsed.date||'',customer:parsed.customer||'',description:parsed.description||'',items:parsed.items&&parsed.items.length?parsed.items:[{desc:'',qty:'',unit:'',amount:''}],status:'Outstanding'};
    setTimeout(()=>{closeModal();setTimeout(()=>{openPOModal(scannedData);},400);},500);
  }catch(err){
    console.error('PO scan error:',err);
    statusEl.innerHTML=`<strong style="color:var(--er)">❌ ${err.message||'Scan failed'}</strong>`;
  }
}

function saveAgent(){
  const eidEl=document.getElementById('eAId');const eid=eidEl?eidEl.value:'';
  const d={name:document.getElementById('aNm').value.trim(),type:document.getElementById('aTy').value,parentCompany:document.getElementById('aPC').value,address:document.getElementById('aAd').value.trim(),contact:document.getElementById('aCo').value.trim(),phone:document.getElementById('aPh').value.trim(),email:document.getElementById('aEm').value.trim(),_modifiedAt:Date.now()};
  if(!d.name){toast('Name required.','error');return;}
  if(!Array.isArray(DB.agents))DB.agents=[];
  if(eid&&eid!==''){
    const i=DB.agents.findIndex(a=>a.id===parseInt(eid));
    if(i>=0){
      const oldName=DB.agents[i].name;
      DB.agents[i]={...DB.agents[i],...d};
      // Update customer references if name changed
      if(oldName!==d.name){DB.custs.forEach(c=>{if(c.agent===oldName){c.agent=d.name;c._modifiedAt=Date.now();}});markTouched('custs');}
    }else{d.id=DB.nA++;DB.agents.push(d);}
  }else{d.id=DB.nA++;DB.agents.push(d);}
  markTouched('agents');saveDB();closeModal();renderAgents();flushPendingSync();toast('Saved.','success');
}

function delAgent(id,name){
  if((DB.agents||[]).length<=1){toast('Cannot delete the last agent.','error');return;}
  const custCount=DB.custs.filter(c=>c.agent===name).length;
  if(!confirm(`Delete agent "${name}"?${custCount?'\n\n⚠ '+custCount+' customer(s) are linked to this agent. They will be set to no agent.':''}`))return;
  tombstoneDelete('agents',id);
  DB.agents=(DB.agents||[]).filter(a=>a.id!==id);
  const now=Date.now();
  DB.custs.forEach(c=>{if(c.agent===name){c.agent='';c._modifiedAt=now;}});
  markTouched('custs');
  saveDB();renderAgents();flushPendingSync();toast('Agent deleted.','info');
}

// CSV helpers
function escCSV(v){
  if(v===null||v===undefined)return'';
  const s=String(v);
  if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}

function toCSV(headers,rows){
  return[headers.map(escCSV).join(','),...rows.map(r=>headers.map(h=>escCSV(r[h])).join(','))].join('\n');
}

function downloadFile(content,filename,type){

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  URL.revokeObjectURL(a.href);
}

function parseCSV(text){
  const lines=[];
  let current='';let inQuote=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){
      if(inQuote&&text[i+1]==='"'){current+='"';i++;}
      else inQuote=!inQuote;
    }else if(c==='\n'&&!inQuote){
      lines.push(current);current='';
    }else{current+=c;}
  }
  if(current.trim())lines.push(current);
  
  return lines.map(line=>{
    const cells=[];let cell='';let q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(q&&line[i+1]==='"'){cell+='"';i++;}else q=!q;}
      else if(c===','&&!q){cells.push(cell);cell='';}
      else{cell+=c;}
    }
    cells.push(cell);
    return cells.map(c=>c.trim());
  });
}

// ===== DUPLICATE DETECTION & CLEANUP =====
function strSim(a,b){
  if(!a||!b)return 0;
  a=a.toLowerCase().trim();b=b.toLowerCase().trim();
  if(a===b)return 1;
  if(a.includes(b)||b.includes(a))return 0.85;
  const wa=new Set(a.split(/\s+/));const wb=new Set(b.split(/\s+/));
  let common=0;wa.forEach(w=>{if(wb.has(w))common++;});
  const wordSim=common/Math.max(wa.size,wb.size);
  let matches=0;const shorter=a.length<b.length?a:b;const longer=a.length<b.length?b:a;
  for(let i=0;i<shorter.length;i++){if(longer.includes(shorter[i]))matches++;}
  const charSim=matches/longer.length;
  return Math.max(wordSim,charSim*0.8);
}

function findDuplicates(){
  const dupes={customers:[],machines:[],addresses:[]};
  const custs=DB.custs||[];
  const machines=DB.machines||[];
  for(let i=0;i<custs.length;i++){
    for(let j=i+1;j<custs.length;j++){
      const sim=strSim(custs[i].name,custs[j].name);
      if(sim>=0.7)dupes.customers.push({a:custs[i],b:custs[j],sim:Math.round(sim*100)});
    }
  }
  const serialMap={};
  machines.forEach(m=>{if(!serialMap[m.serial])serialMap[m.serial]=[];serialMap[m.serial].push(m);});
  Object.entries(serialMap).forEach(([serial,list])=>{if(list.length>1)dupes.machines.push({serial,items:list});});
  for(let i=0;i<custs.length;i++){
    for(let j=i+1;j<custs.length;j++){
      if(!custs[i].address||!custs[j].address)continue;
      const sim=strSim(custs[i].address,custs[j].address);
      if(sim>=0.75&&custs[i].name!==custs[j].name)dupes.addresses.push({a:custs[i],b:custs[j],sim:Math.round(sim*100)});
    }
  }
  return dupes;
}

  const machList=(DB.machines||[]).map(m=>({id:m.id,serial:m.serial,model:m.model,customer:m.customer}));

function mergeCusts(keepId,keepName,removeId,removeName){
  if(!confirm(`Merge "${removeName}" into "${keepName}"?\n\nAll machines, reports, and jobs under "${removeName}" will be updated to "${keepName}".`))return;
  (DB.machines||[]).forEach(m=>{if(m.customer===removeName)m.customer=keepName;});
  DB.reports.forEach(r=>{if(r.customer===removeName)r.customer=keepName;});
  DB.jobs.forEach(j=>{if(j.customer===removeName)j.customer=keepName;});
  const keep=DB.custs.find(c=>c.id===keepId);
  const remove=DB.custs.find(c=>c.id===removeId);
  if(keep&&remove){
    if(!keep.contact&&remove.contact)keep.contact=remove.contact;
    if(!keep.phone&&remove.phone)keep.phone=remove.phone;
    if(!keep.email&&remove.email)keep.email=remove.email;
    if(!keep.address&&remove.address)keep.address=remove.address;
    if(!keep.agent&&remove.agent)keep.agent=remove.agent;
    // Merge contacts arrays
    const kc=keep.contacts||[];const rc=remove.contacts||[];
    rc.forEach(c=>{if(!kc.find(k=>k.name===c.name&&k.phone===c.phone))kc.push(c);});
    keep.contacts=kc;
  }
  DB.custs=DB.custs.filter(c=>c.id!==removeId);
  saveDB();closeModal();renderCusts();renderMachines();
  toast(`Merged "${removeName}" → "${keepName}"`,'success');
}

function mergeSerials(serial){
  const items=(DB.machines||[]).filter(m=>m.serial===serial);
  if(items.length<=1)return;
  if(!confirm(`Keep first entry for S/N "${serial}" and remove ${items.length-1} duplicate(s)?`))return;
  const keepId=items[0].id;
  DB.machines=DB.machines.filter(m=>m.serial!==serial||m.id===keepId);
  saveDB();closeModal();renderMachines();
  toast(`Removed ${items.length-1} duplicate(s) for S/N ${serial}`,'success');
}

function saveAsDefault(){
  if(!CUR_USER||CUR_USER.role!=='admin'){toast('Admin only.','error');return;}
  if(!confirm('Save current database as the DEFAULT?\n\nWhen you or anyone clicks "Reset to Default", it will restore to this exact state.'))return;
  // Save to Firebase under a separate path
  const snapshot=JSON.parse(JSON.stringify(DB));
  // Don't save tombstones in the snapshot — they're only meaningful for live merges
  delete snapshot._tombstones;
  snapshot._savedAt=Date.now();
  try{localStorage.setItem('ocrm4_default',JSON.stringify(snapshot));}catch(e){}
  if(USE_FB&&fbDB){
    fbDB.ref('octoCRM_v4_default').set(snapshot).then(()=>{
      toast('Default database saved! ✓','success');
      // If the data backup page is open, refresh it to show the new snapshot
      if(document.querySelector('#page-data-mgmt.active'))renderDataMgmt();
    }).catch(e=>{toast('Saved locally. Firebase error: '+e.message,'info');if(document.querySelector('#page-data-mgmt.active'))renderDataMgmt();});
  }else{
    toast('Default database saved locally.','success');
    if(document.querySelector('#page-data-mgmt.active'))renderDataMgmt();
  }
}

function resetAllData(){
  if(!CUR_USER||CUR_USER.role!=='admin'){toast('Admin only.','error');return;}
  if(!confirm('Reset database to the last saved DEFAULT?\n\nAll changes since the last "Save as Default" will be lost.'))return;
  if(!confirm('FINAL WARNING: This will replace ALL current data with the default database.\n\nProceed?'))return;
  
  function restoreDB(data){
    DB=data;
    // Ensure all arrays exist (Firebase may have stored as objects)
    ['reports','jobs','techs','custs','users','machines','agents','pos','warehouses','inventory','deletedCusts','deletedMachines'].forEach(k=>{
      if(!DB[k])DB[k]=[];
      else if(!Array.isArray(DB[k]))DB[k]=Object.values(DB[k]);
    });
    if(!DB.users.length)DB.users=DEF_USERS;
    // Recalculate counters
    try{
      DB.nR=Math.max(1,...DB.reports.map(r=>(r&&r.id)||0))+1;
      DB.nJ=Math.max(1,...DB.jobs.map(j=>(j&&j.id)||0))+1;
      DB.nT=Math.max(1,...DB.techs.map(t=>(t&&t.id)||0))+1;
      DB.nC=Math.max(1,...DB.custs.map(c=>(c&&c.id)||0))+1;
      DB.nU=Math.max(1,...DB.users.map(u=>(u&&u.id)||0))+1;
      DB.nM=Math.max(200,...DB.machines.map(m=>(m&&m.id)||0))+1;
      DB.nA=Math.max(1,...DB.agents.map(a=>(a&&a.id)||0))+1;
      DB.nP=Math.max(1,...DB.pos.map(p=>(p&&p.id)||0))+1;
    DB.nW=Math.max(1,...(DB.warehouses||[]).map(w=>(w&&w.id)||0))+1;
    DB.nI=Math.max(1,...(DB.inventory||[]).map(i=>(i&&i.id)||0))+1;
    }catch(e){}
    saveDB();
    localStorage.removeItem('ocrm4_session');
    toast('Database restored to default!','success');
    setTimeout(()=>location.reload(),500);
  }
  
  if(USE_FB&&fbDB){
    fbDB.ref('octoCRM_v4_default').once('value').then(s=>{
      const def=s.val();
      if(def&&(def.users||def.custs||def.reports)){restoreDB(def);}
      else{tryLocalDefault();}
    }).catch(()=>{tryLocalDefault();});
  }else{tryLocalDefault();}
}

function tryLocalDefault(){
  try{
    const s=localStorage.getItem('ocrm4_default');
    if(s){restoreDB(JSON.parse(s));}
    else{
      if(!confirm('No default database found. Do a FULL WIPE instead?\n\nThis will clear everything and start completely fresh.'))return;
      localStorage.removeItem('ocrm4');localStorage.removeItem('ocrm4_session');
      if(USE_FB&&fbDB)fbDB.ref('octoCRM_v4').remove().then(()=>location.reload()).catch(()=>location.reload());
      else location.reload();
    }
  }catch(e){location.reload();}
}

async function generateReportPDF(reportData, download){
  // Check libs
  checkPDFLibs();
  if(!pdfLibsReady){
    // One more try - maybe they're still loading
    await new Promise(r=>setTimeout(r,2000));
    checkPDFLibs();
    if(!pdfLibsReady){
      toast('PDF libraries not available. Please reload the page.','error');
      return null;
    }
  }
  
  toast('Generating PDF...','info');
  
  // Create a hidden container for rendering
  const container=document.createElement('div');
  container.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1;';
  container.innerHTML=buildReportHTMLForPDF(reportData);
  document.body.appendChild(container);
  
  try{
    const el=container.querySelector('#pdfContent');
    const canvas=await html2canvas(el,{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'});
    
    const imgData=canvas.toDataURL('image/jpeg',0.92);
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pdfW=pdf.internal.pageSize.getWidth();
    const pdfH=pdf.internal.pageSize.getHeight();
    const imgW=pdfW-20;
    const imgH=(canvas.height*imgW)/canvas.width;
    
    // Handle multi-page if content is tall
    if(imgH<=pdfH-20){
      pdf.addImage(imgData,'JPEG',10,10,imgW,imgH);
    }else{
      let y=0;
      const pageImgH=pdfH-20;
      const srcPageH=(pageImgH/imgH)*canvas.height;
      let page=0;
      while(y<canvas.height){
        if(page>0)pdf.addPage();
        const pageCanvas=document.createElement('canvas');
        pageCanvas.width=canvas.width;
        pageCanvas.height=Math.min(srcPageH,canvas.height-y);
        const pCtx=pageCanvas.getContext('2d');
        pCtx.drawImage(canvas,0,y,canvas.width,pageCanvas.height,0,0,canvas.width,pageCanvas.height);
        const pageImg=pageCanvas.toDataURL('image/jpeg',0.92);
        const h=(pageCanvas.height*imgW)/canvas.width;
        pdf.addImage(pageImg,'JPEG',10,10,imgW,h);
        y+=srcPageH;
        page++;
      }
    }
    
    const fileName=`Service_Report_${reportData.jobNo||'report'}.pdf`;
    
    if(download!==false){
      pdf.save(fileName);
      toast('PDF downloaded: '+fileName,'success');
    }
    
    document.body.removeChild(container);
    return {pdf,fileName,blob:pdf.output('blob')};
  }catch(err){
    console.error('PDF generation error:',err);
    document.body.removeChild(container);
    toast('PDF generation failed: '+err.message,'error');
    return null;
  }
}

async function downloadReportPDF(id){
  const r=DB.reports.find(x=>x.id===id);
  if(!r){toast('Report not found.','error');return;}
  await generateReportPDF(r,true);
}

async function emailReportPDF(id){
  const r=DB.reports.find(x=>x.id===id);
  if(!r){toast('Report not found.','error');return;}
  
  const result=await generateReportPDF(r,true);
  if(!result)return;
  
  // Open email client with instructions
  const co=CO[r.company]||CO.octopack;
  const cust=DB.custs.find(c=>c.name===r.customer);
  const toEmail=cust?.email||'';
  const subj=`Service Report ${r.jobNo} — ${r.type} — ${co.name}`;
  const body=`Dear ${r.contact||'Customer'},\n\nPlease find attached the service report PDF.\n\nJob No.: ${r.jobNo}\nDate: ${r.date}\nEquipment: ${r.model} (S/N: ${r.serial})\nType: ${r.type}\nStatus: ${r.status}\n\nRegards,\n${r.engineer||''}\n${co.name}`;
  
  // Try Web Share API first (mobile — can share PDF directly)
  if(navigator.share&&navigator.canShare){
    try{
      const file=new File([result.blob],result.fileName,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({title:subj,text:'Service Report '+r.jobNo,files:[file]});
        toast('Shared successfully!','success');
        return;
      }
    }catch(e){if(e.name!=='AbortError')console.warn('Share failed:',e);}
  }
  
  // Fallback: open mailto (PDF already downloaded)
  const cc=cust?.email?'':'';
  window.open(`mailto:${toEmail}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body+'\n\n📎 Please attach the downloaded PDF file: '+result.fileName)}`);
  toast('PDF downloaded. Attach it to the email.','info');
}
